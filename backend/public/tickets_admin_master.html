<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tem de Tudo - Tickets</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  body { font-family: 'Be Vietnam Pro', sans-serif; }
  h1,h2,h3,.font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
</style>
<script src="/dist/stitch-app.min.js?v=20260422-optimized" defer></script>
</head>
<body class="bg-[#f8f5fe] text-[#2e2e34]" data-page="tickets_admin_master">
<header class="sticky top-0 z-40 bg-white/90 backdrop-blur border-b border-slate-200">
  <div class="max-w-7xl mx-auto px-4 md:px-6 py-3 flex items-center justify-between gap-3">
    <a href="/dashboard_admin_master.html" class="inline-flex items-center gap-2 text-sm font-semibold text-[#7A2C8F] hover:underline">
      <span class="material-symbols-outlined text-base">arrow_back</span>
      Voltar ao Dashboard
    </a>
    <div class="flex items-center gap-2">
      <a href="/relat_rios_gerais_master.html" class="text-xs font-semibold px-3 py-1.5 rounded-lg bg-slate-100 hover:bg-slate-200">Relatorios</a>
      <a href="/gest_o_de_usu_rios_master.html" class="text-xs font-semibold px-3 py-1.5 rounded-lg bg-slate-100 hover:bg-slate-200">Usuarios</a>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-4 md:px-6 py-6 space-y-6">
  <section class="space-y-2">
    <h1 class="text-2xl md:text-3xl font-headline font-extrabold">Tickets de Suporte</h1>
    <p class="text-sm text-slate-600">Acompanhe pendencias operacionais e resolva incidentes do fluxo de fidelidade.</p>
  </section>

  <section class="grid grid-cols-2 md:grid-cols-4 gap-3">
    <div class="bg-white rounded-xl shadow-sm p-4">
      <p class="text-xs uppercase font-semibold tracking-wide text-slate-500">Total</p>
      <p class="text-2xl font-headline font-bold text-[#7A2C8F]" id="ticketTotal">--</p>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-4">
      <p class="text-xs uppercase font-semibold tracking-wide text-slate-500">Pendentes</p>
      <p class="text-2xl font-headline font-bold text-amber-600" id="ticketPendentes">--</p>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-4">
      <p class="text-xs uppercase font-semibold tracking-wide text-slate-500">Urgentes</p>
      <p class="text-2xl font-headline font-bold text-rose-600" id="ticketUrgentes">--</p>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-4">
      <p class="text-xs uppercase font-semibold tracking-wide text-slate-500">Resolvidos</p>
      <p class="text-2xl font-headline font-bold text-emerald-600" id="ticketResolvidos">--</p>
    </div>
  </section>

  <section class="bg-white rounded-xl shadow-sm p-4 md:p-5 space-y-4">
    <div class="flex flex-col md:flex-row gap-3 md:items-center md:justify-between">
      <div class="flex items-center gap-2">
        <label for="ticketStatusFilter" class="text-xs font-semibold uppercase tracking-wide text-slate-500">Status</label>
        <select id="ticketStatusFilter" class="h-10 px-3 rounded-lg border border-slate-200 text-sm">
          <option value="pendente">Pendentes</option>
          <option value="resolvido">Resolvidos</option>
          <option value="todos">Todos</option>
        </select>
      </div>
      <div class="w-full md:w-80">
        <input id="ticketBusca" type="text" placeholder="Buscar por titulo, mensagem ou usuario" class="h-10 w-full px-3 rounded-lg border border-slate-200 text-sm"/>
      </div>
    </div>

    <div id="adminTicketsList" class="space-y-3"></div>
    <p id="adminTicketsEmpty" class="hidden text-sm text-slate-500 text-center py-6">Nenhum ticket encontrado para esse filtro.</p>
  </section>
</main>
</body>
</html>
