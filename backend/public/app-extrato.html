<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta content="#e10098" name="theme-color"/>
<meta content="yes" name="mobile-web-app-capable"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="default" name="apple-mobile-web-app-status-bar-style"/>
<meta content="Tem de Tudo" name="apple-mobile-web-app-title"/>
<link href="manifest.json" rel="manifest"/>
<link href="img/icon-192.png" rel="apple-touch-icon"/>
<link href="img/icon-32.png" rel="icon" sizes="32x32" type="image/png"/>
<title>Extrato de Pontos - Tem de Tudo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<script src="js/config.js"></script>
<script src="js/auth-guard.js"></script>
<link href="/css/vivo-styles.css" rel="stylesheet"/>
</head>
<body>
<div class="header">
<div class="header-content">
<button class="btn-back" onclick="window.history.back()">
<i class="fas fa-arrow-left"></i>
</button>
<h1>?? Extrato de Pontos</h1>
</div>
</div>
<div class="saldo-resumo">
<div class="saldo-label">Saldo Total</div>
<div class="saldo-valor" id="saldoTotal">0</div>
</div>
<div class="filtros">
<button class="filtro-btn active" data-tipo="todos">Todos</button>
<button class="filtro-btn" data-tipo="ganhos">? Ganhos</button>
<button class="filtro-btn" data-tipo="gastos">?? Gastos</button>
<button class="filtro-btn" data-tipo="check-in">?? Check-ins</button>
</div>
<div class="timeline" id="timeline"></div>
<div class="bottom-nav">
<a class="nav-item" href="app-inicio.html">
<i class="fas fa-home"></i>
<span>In?cio</span>
</a>
<a class="nav-item" href="app-empresas.html">
<i class="fas fa-store"></i>
<span>Empresas</span>
</a>
<a class="nav-item" href="app-promocoes.html">
<i class="fas fa-gift"></i>
<span>Promo??es</span>
</a>
<a class="nav-item" href="app-perfil.html">
<i class="fas fa-user"></i>
<span>Perfil</span>
</a>
</div>
<script>
        const API_BASE_URL = 'http://localhost:8000';
        let todosTransacoes = [];
        let filtroAtual = 'todos';
        document.addEventListener('DOMContentLoaded', () => {
            carregarExtrato();
            // Filtros
            document.querySelectorAll('.filtro-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    filtroAtual = btn.dataset.tipo;
                    renderizarExtrato();
                });
            });
        });
        async function carregarExtrato() {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`${API_BASE_URL}/api/pontos/historico`, {
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });
                if (!response.ok) throw new Error('Erro ao carregar extrato');
                const result = await response.json();
                if (result.success && result.data) {
                    todosTransacoes = result.data.historico || result.data || [];
                    document.getElementById('saldoTotal').textContent = result.data.saldo || 0;
                } else {
                    todosTransacoes = [];
                }
                renderizarExtrato();
            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('timeline').innerHTML = `
                    <div class="empty-state">
<i class="fas fa-exclamation-circle"></i>
<p>Erro ao carregar extrato</p>
</div>
                `;
            }
        }
        function renderizarExtrato() {
            const timeline = document.getElementById('timeline');
            let transacoesFiltradas = todosTransacoes;
            if (filtroAtual === 'ganhos') {
                transacoesFiltradas = todosTransacoes.filter(t => t.pontos > 0);
            } else if (filtroAtual === 'gastos') {
                transacoesFiltradas = todosTransacoes.filter(t => t.pontos < 0);
            } else if (filtroAtual === 'check-in') {
                transacoesFiltradas = todosTransacoes.filter(t => 
                    t.tipo && t.tipo.toLowerCase().includes('check')
                );
            }
            if (transacoesFiltradas.length === 0) {
                timeline.innerHTML = `
                    <div class="empty-state">
<i class="fas fa-inbox"></i>
<p>Nenhuma transa??o encontrada</p>
</div>
                `;
                return;
            }
            timeline.innerHTML = transacoesFiltradas.map(t => `
                <div class="timeline-item">
<div class="item-header">
<div>
<div class="item-empresa">${t.empresa_nome || t.descricao || 'Transa??o'}</div>
<div class="item-tipo">${t.tipo || 'Pontos'}</div>
<div class="item-data">${formatarData(t.created_at || t.data)}</div>
</div>
<div class="item-pontos ${t.pontos > 0 ? 'positivo' : 'negativo'}">
                            ${t.pontos > 0 ? '+' : ''}${t.pontos}
                        </div>
</div>
</div>
            `).join('');
        }
        function formatarData(dataString) {
            if (!dataString) return 'Data n?o dispon?vel';
            const data = new Date(dataString);
            const hoje = new Date();
            const ontem = new Date(hoje);
            ontem.setDate(hoje.getDate() - 1);
            if (data.toDateString() === hoje.toDateString()) {
                return `Hoje ?s ${data.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`;
            } else if (data.toDateString() === ontem.toDateString()) {
                return `Ontem ?s ${data.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`;
            } else {
                return data.toLocaleDateString('pt-BR', { 
                    day: '2-digit', 
                    month: 'short', 
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }
        }
    </script>
</body>
</html>
