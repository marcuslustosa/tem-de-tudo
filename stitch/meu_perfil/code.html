<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Be+Vietnam+Pro', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        h1, h2, h3, .font-headline {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "on-surface-variant": "#5b5b62",
                "tertiary": "#00666e",
                "tertiary-fixed-dim": "#3ed9e9",
                "primary-fixed-dim": "#ff49b3",
                "surface-tint": "#b00076",
                "surface-variant": "#dedbe7",
                "surface-bright": "#f8f5fe",
                "error-container": "#f74b6d",
                "inverse-primary": "#ff40b2",
                "on-primary-fixed": "#000000",
                "secondary-fixed": "#f7bfff",
                "surface": "#f8f5fe",
                "surface-dim": "#d5d3df",
                "primary-fixed": "#ff6bbb",
                "background": "#f8f5fe",
                "on-error-container": "#510017",
                "on-tertiary-fixed-variant": "#005c63",
                "on-secondary-fixed": "#5a0371",
                "on-primary": "#ffeff3",
                "on-secondary-fixed-variant": "#7b2d90",
                "error": "#b41340",
                "secondary-dim": "#7a2c8f",
                "on-primary-fixed-variant": "#5b003b",
                "surface-container-highest": "#dedbe7",
                "surface-container-high": "#e4e1ec",
                "surface-container": "#e9e7f1",
                "tertiary-fixed": "#52e8f7",
                "secondary-container": "#f7bfff",
                "error-dim": "#a70138",
                "on-tertiary": "#d2faff",
                "secondary": "#87399c",
                "on-tertiary-fixed": "#003d42",
                "primary-container": "#ff6bbb",
                "on-error": "#ffefef",
                "tertiary-container": "#52e8f7",
                "outline-variant": "#aeacb4",
                "on-surface": "#2e2e34",
                "inverse-surface": "#0d0e13",
                "surface-container-low": "#f2eff9",
                "tertiary-dim": "#005960",
                "outline": "#77767d",
                "surface-container-lowest": "#ffffff",
                "on-secondary": "#ffeefd",
                "primary-dim": "#9b0067",
                "on-tertiary-container": "#005158",
                "on-secondary-container": "#712286",
                "inverse-on-surface": "#9e9ca4",
                "secondary-fixed-dim": "#f2aaff",
                "on-primary-container": "#4a002f",
                "primary": "#b00076",
                "on-background": "#2e2e34"
              },
              fontFamily: {
                "headline": ["Plus Jakarta Sans"],
                "body": ["Be Vietnam Pro"],
                "label": ["Be Vietnam Pro"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen pb-24">
<!-- TopAppBar -->
<header class="bg-[#f8f5fe] dark:bg-slate-950 docked full-width top-0 z-40 sticky">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-md mx-auto">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container border-2 border-primary-container">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Close-up portrait of a smiling young woman with natural lighting and soft blurred background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBWmNHsEgkUwQZBHEhZZJOtAQAxkUrRlRaSCOP-l_g3lPEwW_lkYOXN9Oa7X1bgJHW4NKrhgy4uOK9NSD4Qecjpk7vxkLA4b8TzX3_YuCBuAvCxFJtydDwa8tdYJtJixvv7v_-bIx2fbJ3W5IHg-CK2YN7Ubjk8zHkK-lxwYznWTwnPTeHBFAT1RTcJcTWFOdSJhy0Z52aQXICsdYPMZj1fFTnTszSbQLUpMEJQfl0IQCkFgiKzqW7vkvjm_CLBx165brA4DgaImB9v"/>
</div>
<h1 class="text-[#2e2e34] dark:text-white font-bold text-xl font-['Plus_Jakarta_Sans']">Olá, Bem-vindo</h1>
</div>
<button class="text-[#E10098] dark:text-[#E10098] hover:opacity-80 transition-opacity scale-95 active:transition-all">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</header>
<main class="max-w-md mx-auto px-6 pt-4 space-y-6">
<!-- User Profile Card (Integrated Status) -->
<section class="relative overflow-hidden bg-gradient-to-br from-[#003B49] via-[#7A2C8F] to-[#E10098] p-6 rounded-xl text-white">
<div class="relative z-10 flex flex-col gap-4">
<div class="flex justify-between items-start">
<div>
<p class="text-on-primary/80 text-sm font-medium mb-1">Membro Platinum</p>
<h2 class="text-2xl font-bold font-headline">Amanda Silva</h2>
</div>
<div class="bg-white/20 backdrop-blur-md px-3 py-1 rounded-full text-xs font-bold border border-white/10 uppercase tracking-wider">
                        Ativa
                    </div>
</div>
<div class="mt-4">
<div class="flex justify-between items-end mb-2">
<span class="text-3xl font-bold font-headline">12.450 <span class="text-sm font-normal opacity-80">pontos</span></span>
<span class="text-xs opacity-80">Faltam 2.550 para o próximo nível</span>
</div>
<!-- Loyalty Progress Bar -->
<div class="h-2 w-full bg-surface-container-highest/30 rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary-fixed to-secondary-fixed w-[80%] rounded-full"></div>
</div>
</div>
</div>
<!-- Decorative circle -->
<div class="absolute -bottom-10 -right-10 w-40 h-40 bg-accent-cyan opacity-10 rounded-full blur-3xl"></div>
</section>
<!-- Menu Grid -->
<section class="space-y-4">
<h3 class="text-on-surface font-bold text-lg font-headline px-1">Minha Conta</h3>
<div class="space-y-2">
<!-- Meus Benefícios -->
<button class="w-full flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl hover:bg-surface-container-high transition-colors group">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="stars">stars</span>
</div>
<span class="font-semibold text-on-surface">Meus Benefícios</span>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Histórico -->
<button class="w-full flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl hover:bg-surface-container-high transition-colors group">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-secondary/10 flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="history">history</span>
</div>
<span class="font-semibold text-on-surface">Histórico de Pontos</span>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Configurações -->
<button class="w-full flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl hover:bg-surface-container-high transition-colors group">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-tertiary/10 flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</div>
<span class="font-semibold text-on-surface">Configurações</span>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>
<section class="space-y-4">
<h3 class="text-on-surface font-bold text-lg font-headline px-1">Suporte</h3>
<div class="space-y-2">
<!-- Central de Ajuda -->
<button class="w-full flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl hover:bg-surface-container-high transition-colors group">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-surface-container-high flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="help">help</span>
</div>
<span class="font-semibold text-on-surface">Central de Ajuda</span>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>
<!-- Exit Action -->
<section class="pt-4 pb-8">
<button class="w-full flex items-center justify-center gap-2 p-4 text-error font-bold border border-error/10 rounded-xl hover:bg-error/5 transition-colors">
<span class="material-symbols-outlined" data-icon="logout">logout</span>
                Sair da Conta
            </button>
</section>
</main>
<!-- BottomNavBar (Semantic Shell) -->
<nav class="fixed bottom-0 left-0 w-full z-50 rounded-t-[1.5rem] bg-white dark:bg-slate-900 shadow-[0_-8px_32px_rgba(11,31,58,0.08)] border-t border-[#00666e]/20">
<div class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/90 backdrop-blur-xl">
<!-- Início -->
<a class="flex flex-col items-center justify-center text-[#aeacb4] hover:text-[#7A2C8F] transition-colors scale-90 active:transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Plus_Jakarta_Sans'] font-semibold text-[10px] uppercase tracking-wider mt-1">Início</span>
</a>
<!-- Parceiros -->
<a class="flex flex-col items-center justify-center text-[#aeacb4] hover:text-[#7A2C8F] transition-colors scale-90 active:transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="storefront">storefront</span>
<span class="font-['Plus_Jakarta_Sans'] font-semibold text-[10px] uppercase tracking-wider mt-1">Parceiros</span>
</a>
<!-- Pontos -->
<a class="flex flex-col items-center justify-center text-[#aeacb4] hover:text-[#7A2C8F] transition-colors scale-90 active:transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="stars">stars</span>
<span class="font-['Plus_Jakarta_Sans'] font-semibold text-[10px] uppercase tracking-wider mt-1">Pontos</span>
</a>
<!-- Prêmios -->
<a class="flex flex-col items-center justify-center text-[#aeacb4] hover:text-[#7A2C8F] transition-colors scale-90 active:transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="redeem">redeem</span>
<span class="font-['Plus_Jakarta_Sans'] font-semibold text-[10px] uppercase tracking-wider mt-1">Prêmios</span>
</a>
<!-- Perfil (Active) -->
<a class="flex flex-col items-center justify-center text-[#E10098] relative after:content-[''] after:w-1 after:h-1 after:bg-[#E10098] after:rounded-full after:mt-1 scale-90 active:transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-['Plus_Jakarta_Sans'] font-semibold text-[10px] uppercase tracking-wider mt-1">Perfil</span>
</a>
</div>
</nav>
</body></html>
