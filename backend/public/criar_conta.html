<!doctype html>
<html class="light" lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <title>Tem de Tudo - Criar Conta</title>
  <link rel="manifest" href="/manifest.json" />  <link rel="icon" type="image/png" href="/img/logo.png" />
  <link rel="shortcut icon" href="/img/logo.png" />
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link href="/css/i9plus-phase8.css?v=20260719-app5" rel="stylesheet" />
  <style>
    body { background: #ffffff; min-height: 100dvh; }
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
    .field { display:block; width:100%; padding:12px 16px; background:var(--i9-surface-soft); border:1px solid transparent; border-radius:14px; color:#17171c; font-size:15px; outline:none; transition:border-color .15s ease, background .15s ease; }
    .field:focus { background:#fff; border-color:rgba(176,23,116,.35); }
    .lbl { display:block; font-size:12.5px; font-weight:600; color:#4b5061; margin:0 0 6px 2px; }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const perfilSelect = document.getElementById('sgPerfil');
      const tipo = new URLSearchParams(window.location.search).get('tipo');
      if (tipo === 'empresa' && perfilSelect) {
        perfilSelect.value = 'empresa';
        document.getElementById('empresaFields')?.classList.remove('hidden');
      }
    });
  </script>
  <script src="/dist/stitch-app.min.js?v=20260719-app5" defer></script>
</head>
<body class="text-[#17171c]" data-page="criar_conta">
  <main class="mx-auto w-full max-w-[520px] px-5 pb-10 pt-8">
    <div class="text-center">
      <img alt="Tem de Tudo" src="/img/logo.png" onerror="this.onerror=null;this.src='/img/logo.png.png';" class="mx-auto h-14 w-auto" />
      <h1 class="mt-5 text-2xl font-extrabold text-[#111B3F]">Criar sua conta</h1>
      <p class="mt-1 text-sm text-[#6b7280]">É rápido. Preencha os dados abaixo para começar.</p>
    </div>

    <form id="signupForm" class="mt-7 space-y-4">
      <div id="perfilContainer">
        <label class="lbl">Tipo de conta</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#b01774]">group</span>
          <select id="sgPerfil" class="field pl-11">
            <option value="cliente">Sou cliente</option>
            <option value="empresa" id="empresaOption">Sou estabelecimento</option>
          </select>
        </div>
        <p id="empresaRestricao" class="hidden mt-2 text-xs text-amber-700 bg-amber-50 px-3 py-2 rounded-lg border border-amber-200">
          <span class="material-symbols-outlined text-sm align-middle">info</span>
          Cadastro enviado. Após a confirmação do pagamento, o admin aprovará seu estabelecimento.
        </p>
      </div>

      <div class="grid gap-4 md:grid-cols-2">
        <div class="md:col-span-2" id="sgNomeGroup">
          <label id="sgNomeLabel" class="lbl">Nome</label>
          <input id="sgNome" type="text" required class="field" placeholder="Seu nome completo" />
        </div>
        <div>
          <label class="lbl">E-mail</label>
          <input id="sgEmail" type="email" required class="field" placeholder="voce@email.com" />
        </div>
        <div>
          <label class="lbl">Telefone</label>
          <input id="sgTelefone" type="text" class="field" placeholder="(11) 90000-0000" />
        </div>
        <div id="sgNascimentoGroup" class="md:col-span-2">
          <label class="lbl">Data de nascimento</label>
          <input id="sgDataNascimento" type="date" class="field" />
          <p class="mt-1 text-[11px] text-[#8a8f9c]">Usada para liberar bônus de aniversário nas empresas.</p>
        </div>
      </div>

      <div id="empresaFields" class="hidden grid gap-4 md:grid-cols-2">
        <div class="md:col-span-2">
          <label class="lbl">Nome fantasia</label>
          <input id="sgNomeFantasia" type="text" class="field" placeholder="Nome do estabelecimento" />
        </div>
        <div>
          <label class="lbl">CNPJ</label>
          <input id="sgCnpj" type="text" class="field" placeholder="00.000.000/0000-00" />
        </div>
        <div>
          <label class="lbl">WhatsApp</label>
          <input id="sgWhatsApp" type="text" class="field" placeholder="(11) 90000-0000" />
        </div>
        <div>
          <label class="lbl">Categoria</label>
          <select id="sgCategoria" class="field"><option value="">Selecione uma categoria</option></select>
        </div>
        <div class="md:col-span-2">
          <label class="lbl">Endereço</label>
          <input id="sgEndereco" type="text" class="field" placeholder="Rua, número, bairro" />
        </div>
      </div>

      <div class="grid gap-4 md:grid-cols-2">
        <div>
          <label class="lbl">Senha</label>
          <input id="sgSenha" type="password" required class="field" placeholder="Mínimo 6 caracteres" />
        </div>
        <div>
          <label class="lbl">Confirmar senha</label>
          <input id="sgSenhaConf" type="password" required class="field" placeholder="Repita a senha" />
        </div>
      </div>

      <label class="inline-flex items-start gap-2 text-sm text-[#4b5061]">
        <input id="sgTerms" type="checkbox" class="rounded mt-0.5" required />
        <span>Li e aceito os <a href="/termos.html" target="_blank" class="font-bold text-[#b01774] underline underline-offset-2">termos de uso</a>.</span>
      </label>

      <div id="referralField">
        <label class="lbl">Código de indicação <span class="font-normal text-[#8a8f9c]">(opcional)</span></label>
        <input id="sgReferralCode" type="text" maxlength="12" class="field uppercase tracking-widest" placeholder="Ex: ABC12XYZ" />
      </div>

      <button type="submit" class="btn btn--primary btn--block mt-2">Criar conta</button>
    </form>

    <p class="mt-6 text-center text-sm text-[#6b7280]">
      Já tem conta?
      <a class="font-bold text-[#b01774] hover:underline underline-offset-4 ml-1" href="/entrar.html">Entrar</a>
    </p>
  </main>
</body>
</html>
