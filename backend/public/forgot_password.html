<!doctype html>
<html class="light" lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tem de Tudo - Recuperar Senha</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: "Be Vietnam Pro", sans-serif;
      background-color: #f8f5fe;
      min-height: 100dvh;
    }
    .bg-radiant-pattern {
      background: radial-gradient(circle at 0% 0%, #003b49 0%, transparent 50%),
                  radial-gradient(circle at 100% 100%, #7a2c8f 0%, transparent 50%),
                  radial-gradient(circle at 100% 0%, #e10098 0%, transparent 40%);
      background-color: #f8f5fe;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
  </style>
  <script src="/js/stitch-app.js?v=20260401-stab6" defer></script>
</head>
<body data-page="forgot_password" class="min-h-screen flex items-center justify-center p-4 bg-radiant-pattern">
  <main class="w-full max-w-md space-y-8">
    <header class="text-center space-y-4">
      <div class="inline-flex items-center justify-center p-4 rounded-3xl bg-white shadow-[0_8px_32px_rgba(11,31,58,0.08)]">
        <img alt="Tem de Tudo" src="/img/logo.png" onerror="this.onerror=null;this.src='/img/logo.png.png';" class="h-12 w-auto" />
      </div>
      <h1 class="text-2xl font-bold text-slate-900">Recuperar senha</h1>
      <p class="text-sm text-slate-600">Informe seu e-mail para receber o link de recuperacao.</p>
    </header>

    <section class="glass-card rounded-3xl p-8 shadow-[0_20px_50px_rgba(11,31,58,0.12)]">
      <form class="space-y-4">
        <label class="block text-xs font-semibold text-slate-600 uppercase tracking-widest pl-1">E-mail</label>
        <input id="fpEmail" type="email" required class="block w-full px-4 py-3 bg-slate-100 border-none rounded-2xl text-slate-800 focus:ring-2 focus:ring-[#7A2C8F]/20" placeholder="voce@email.com" />
        <button type="submit" class="w-full py-4 px-6 bg-gradient-to-r from-[#7A2C8F] to-[#E10098] text-white font-bold rounded-2xl shadow-lg shadow-[#7A2C8F]/20 hover:opacity-95 active:scale-[0.98] transition-all duration-200">
          Enviar link
        </button>
      </form>

      <p class="text-center text-sm text-slate-600 mt-4">
        <a class="text-[#7A2C8F] font-bold hover:underline underline-offset-4" href="/entrar.html">Voltar ao login</a>
      </p>
    </section>
  </main>
</body>
</html>
