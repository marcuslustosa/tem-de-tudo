<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Redefinir senha | Tem de Tudo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.10/dist/tailwind.min.css">
  <script src="/js/stitch-app.js" defer></script>
</head>
<body data-page="reset_password" class="min-h-screen bg-slate-50 text-slate-900 flex items-center justify-center">
  <main class="w-full max-w-md bg-white shadow-lg rounded-2xl p-6 space-y-4">
    <div class="text-center">
      <h1 class="text-2xl font-bold">Redefinir senha</h1>
      <p class="text-sm text-slate-600">Cole o token recebido por e-mail.</p>
    </div>
    <form class="space-y-3">
      <input id="rpEmail" class="w-full border rounded-lg px-3 py-2" type="email" placeholder="E-mail" required />
      <input id="rpToken" class="w-full border rounded-lg px-3 py-2" type="text" placeholder="Token" required />
      <input id="rpPass" class="w-full border rounded-lg px-3 py-2" type="password" placeholder="Nova senha" required />
      <input id="rpPassConf" class="w-full border rounded-lg px-3 py-2" type="password" placeholder="Confirmar nova senha" required />
      <button class="w-full bg-indigo-600 text-white font-semibold px-4 py-2 rounded-lg" type="submit">Redefinir senha</button>
    </form>
  </main>
</body>
</html>
