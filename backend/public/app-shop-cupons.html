<body>

<h1 class="tdt-inline-f92cdca0">Shop de Cupons</h1>

</div>
<div class="card">

</div>

<!-- Ser? preenchido via JavaScript -->
</div>
</div>

<script>  // Dados fict?cios do shop de cupons  const cuponsShop = [  {  id: 1,  titulo: 'R$ 10 OFF',  descricao: 'Desconto de R$ 10 em compras acima de R$ 50',  pontos: 100,  valorReal: 10.00,  categoria: 'desconto',  icone: 'fas fa-percentage',  cor: '#10b981'  },  {  id: 2,  titulo: 'Frete Gr?tis',  descricao: 'Delivery gratuito em qualquer pedido',  pontos: 50,  valorReal: 8.00,  categoria: 'delivery',  icone: 'fas fa-shipping-fast',  cor: '#3b82f6'  },  {  id: 3,  titulo: 'R$ 25 OFF',  descricao: 'Desconto de R$ 25 em compras acima de R$ 100',  pontos: 250,  valorReal: 25.00,  categoria: 'desconto',  icone: 'fas fa-tags',  cor: '#f59e0b'  },  {  id: 4,  titulo: '2 por 1 Pizza',  descricao: 'Compre 1 pizza grande e ganhe outra igual',  pontos: 300,  valorReal: 35.00,  categoria: 'promocao',  icone: 'fas fa-pizza-slice',  cor: '#ef4444'  },  {  id: 5,  titulo: '20% OFF Beleza',  descricao: '20% de desconto em todos os servi?os de beleza',  pontos: 150,  valorReal: 20.00,  categoria: 'beleza',  icone: 'fas fa-spa',  cor: '#8b5cf6'  },  {  id: 6,  titulo: 'Academia Gr?tis',  descricao: '1 semana gr?tis na academia',  pontos: 400,  valorReal: 80.00,  categoria: 'fitness',  icone: 'fas fa-dumbbell',  cor: '#06b6d4'  }  ];  // Meus cupons (comprados)  let meusCupons = [  {  id: 1,  titulo: 'R$ 10 OFF',  descricao: 'Desconto de R$ 10 em compras acima de R$ 50',  codigo: 'DESC10XYZ',  validade: '2026-03-15',  usado: false  }  ];  let pontosUsuario = 250; // Pontos fict?cios do usu?rio  document.addEventListener('DOMContentLoaded', () => {  renderizarShop();  renderizarMeusCupons();  // Tabs  document.querySelectorAll('.tab').forEach(tab => {  tab.addEventListener('click', () => {  document.querySelectorAll('.tab').forEach(t => {  t.classList.remove('active');  t.style.background = 'transparent';  t.style.color = '#888';  });  tab.classList.add('active');  tab.style.background = 'linear-gradient(135deg, #667eea, #764ba2)';  tab.style.color = 'white';  const targetTab = tab.dataset.tab;  document.querySelectorAll('.tab-content').forEach(content => {  content.style.display = 'none';  });  document.getElementById(`tab-${targetTab}`).style.display = 'block';  });  });  });  function renderizarShop() {  const grid = document.getElementById('cuponsShop');  document.getElementById('pontosUser').textContent = `${pontosUsuario} pontos`;  grid.innerHTML = cuponsShop.map(cupom => `  <div class="cupom-card" style="background: #2a2a3e; border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid rgba(102, 126, 234, 0.1);">
<div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px;">
<div style="display: flex; align-items: center; gap: 12px;">
<div style="width: 48px; height: 48px; background: ${cupom.cor}; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #1D1D1F;">
<i class="${cupom.icone}"></i>
</div>
<div>
<div style="font-size: 16px; font-weight: 700; margin-bottom: 4px;">${cupom.titulo}</div>
<div style="font-size: 12px; color: #888;">${cupom.descricao}</div>
</div>
</div>
<div class="preco" style="text-align: right;">
<div style="font-size: 18px; font-weight: 800; color: #f39c12;">${cupom.pontos} pts</div>
<div style="font-size: 11px; color: #666;">R$ ${cupom.valorReal.toFixed(2)}</div>
</div>
</div>
<button onclick="comprarCupom(${cupom.id})" ${pontosUsuario < cupom.pontos ? 'disabled' : ''}  style="width: 100%; padding: 12px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: all 0.3s;  background: ${pontosUsuario >= cupom.pontos ? 'linear-gradient(135deg, #f39c12, #9333EA)' : '#444'};  color: ${pontosUsuario >= cupom.pontos ? 'white' : '#666'};">  ${pontosUsuario >= cupom.pontos ? 'Resgatar' : 'Pontos insuficientes'}  </button>
</div>  `).join('');  }  function renderizarMeusCupons() {  const grid = document.getElementById('cuponsDisponiveis');  const cuponsValidos = meusCupons.filter(c => !c.usado);  if (cuponsValidos.length === 0) {  grid.innerHTML = '<div class="card"><i class="fas fa-ticket-alt" style="font-size: 48px; opacity: 0.3; margin-bottom: 16px;"></i><p>Nenhum cupom dispon?vel</p><p style="font-size: 14px; margin-top: 8px;">Resgate cupons na aba Shop</p></div>';  return;  }  grid.innerHTML = cuponsValidos.map(cupom => `  <div class="cupom-card" style="background: #2a2a3e; border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid rgba(102, 126, 234, 0.1);">
<div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px;">
<div>
<div style="font-size: 18px; font-weight: 700; color: #667eea; margin-bottom: 4px;">${cupom.titulo}</div>
<div style="font-size: 14px; color: #bbb; margin-bottom: 8px;">${cupom.descricao}</div>
<div style="font-size: 12px; color: #888;">C?digo: ${cupom.codigo}</div>
<div style="font-size: 12px; color: #888;">V?lido at?: ${cupom.validade}</div>
</div>
<div class="badge" >  V?lido  </div>
</div>
<button onclick="usarCupom('${cupom.codigo}')" >  Usar Cupom  </button>
</div>  `).join('');  }  function comprarCupom(cupomId) {  const cupom = cuponsShop.find(c => c.id === cupomId);  if (pontosUsuario < cupom.pontos) {  alert('Pontos insuficientes!');  return;  }  // Confirmar compra  if (confirm(`Deseja resgatar "${cupom.titulo}" por ${cupom.pontos} pontos?`)) {  pontosUsuario -= cupom.pontos;  // Adicionar aos meus cupons  const novoCupom = {  id: Date.now(),  titulo: cupom.titulo,  descricao: cupom.descricao,  codigo: gerarCodigo(),  validade: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toLocaleDateString('pt-BR'),  usado: false  };  meusCupons.push(novoCupom);  // Atualizar interface  renderizarShop();  renderizarMeusCupons();  alert(`Cupom "${cupom.titulo}" resgatado com sucesso!\\nC?digo: ${novoCupom.codigo}`);  }  }  function usarCupom(codigo) {  if (confirm('Tem certeza que deseja usar este cupom?\\n\\nEsta a??o n?o pode ser desfeita.')) {  const cupom = meusCupons.find(c => c.codigo === codigo);  cupom.usado = true;  renderizarMeusCupons();  alert('Cupom usado com sucesso!');  }  }  function gerarCodigo() {  return Math.random().toString(36).substring(2, 8).toUpperCase();  }  </script>
