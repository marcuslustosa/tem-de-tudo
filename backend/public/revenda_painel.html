<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Painel da Revenda - Tem de Tudo</title>
  <link rel="icon" type="image/png" href="/img/logo.png" />
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/i9plus-phase8.css?v=20260719-app7" />
</head>
<body data-page="revenda_painel" class="bg-[#f7f7f7] text-[#1e1e1e] min-h-screen pb-16" style="font-family:'Inter',sans-serif">
  <header class="bg-white border-b border-[#e9e7f1] sticky top-0 z-40">
    <div class="max-w-3xl mx-auto flex items-center justify-between px-4 py-3">
      <div class="flex items-center gap-2">
        <img src="/img/logo.png" alt="Tem de Tudo" class="h-8 w-auto" onerror="this.onerror=null;this.src='/img/logo.png.png';" />
        <span class="text-sm font-bold text-[#111B3F]">Painel da Revenda</span>
      </div>
      <button id="revLogout" type="button" class="ui-btn ui-btn--outline ui-btn--sm">Sair</button>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 pt-5 space-y-5">
    <!-- Saldo -->
    <section class="rounded-3xl p-6 text-white shadow-lg" style="background:#111b3f">
      <p class="text-[11px] font-bold uppercase tracking-[0.2em] text-white/70">Seu saldo</p>
      <h1 id="revSaldo" class="mt-2 text-4xl font-extrabold">R$ --</h1>
      <p id="revVencimento" class="mt-2 text-sm text-white/85">Vencimento: --</p>
    </section>

    <div class="flex items-center justify-between gap-3">
      <h2 class="text-xl font-extrabold text-[#111B3F]">Meus estabelecimentos</h2>
      <button id="btnRevNovaEmpresa" type="button" class="ui-btn ui-btn--primary ui-btn--sm">
        <span class="material-symbols-outlined text-base">add_business</span>Cadastrar
      </button>
    </div>

    <div id="revEmpresasList" class="space-y-3"></div>
    <div id="revEmpresasSkeleton" class="space-y-3">
      <div class="tdt-skeleton-card"><div class="tdt-skeleton h-4 w-1/2"></div><div class="tdt-skeleton h-3 w-1/3 mt-2"></div></div>
      <div class="tdt-skeleton-card"><div class="tdt-skeleton h-4 w-1/2"></div><div class="tdt-skeleton h-3 w-1/3 mt-2"></div></div>
    </div>
    <div id="revEmpresasEmpty" class="ui-empty hidden">
      <span class="ui-empty__icon"><span class="material-symbols-outlined">storefront</span></span>
      <p class="ui-empty__title">Nenhum estabelecimento ainda</p>
      <p class="ui-empty__desc">Use o botão "Cadastrar" para criar o primeiro. O valor do plano é descontado do seu saldo.</p>
    </div>
  </main>

  <script src="/dist/stitch-app.min.js?v=20260719-app7"></script>
</body>
</html>
