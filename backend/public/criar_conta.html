<!doctype html>
<html class="light" lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tem de Tudo - Criar Conta</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: "Be Vietnam Pro", sans-serif;
      background-color: #f8f5fe;
      min-height: 100dvh;
    }
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
  </style>
  <script>
    // Controle de acesso: apenas admin pode criar empresas
    document.addEventListener('DOMContentLoaded', function() {
      const urlParams = new URLSearchParams(window.location.search);
      const origem = urlParams.get('origem');
      const tipo = urlParams.get('tipo');
      const isAdmin = origem === 'admin';
      
      const empresaOption = document.getElementById('empresaOption');
      const perfilSelect = document.getElementById('sgPerfil');
      const empresaRestricao = document.getElementById('empresaRestricao');
      
      if (!isAdmin) {
        // Público só pode criar conta de CLIENTE
        empresaOption.remove();
        perfilSelect.value = 'cliente';
        perfilSelect.disabled = true;
        empresaRestricao.classList.remove('hidden');
      } else if (tipo === 'empresa') {
        // Admin está criando empresa
        perfilSelect.value = 'empresa';
        const empresaFields = document.getElementById('empresaFields');
        if (empresaFields) empresaFields.classList.remove('hidden');
      }
    });
  </script>
  <script src="/js/stitch-app.js?v=20260421-authfix" defer></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-white" data-page="criar_conta">
  <main class="w-full max-w-xl space-y-8">
    <div class="text-center space-y-5">
      <div class="inline-flex items-center justify-center p-4 rounded-3xl bg-white shadow-[0_8px_32px_rgba(11,31,58,0.08)]">
        <img alt="Tem de Tudo" src="/img/logo.png" onerror="this.onerror=null;this.src='/img/logo.png.png';" class="h-12 w-auto" />
      </div>
      <div class="space-y-2">
        <h1 class="text-2xl font-bold text-slate-900 font-headline leading-tight">Criar conta</h1>
        <p class="text-slate-600 text-sm font-medium">Escolha o perfil e finalize seu cadastro.</p>
      </div>
    </div>

    <section class="glass-card rounded-3xl p-8 shadow-[0_20px_50px_rgba(11,31,58,0.12)] space-y-5">
      <form id="signupForm" class="space-y-4">
        <div class="space-y-2" id="perfilContainer">
          <label class="block text-xs font-semibold text-slate-600 uppercase tracking-widest pl-1">Tipo de conta</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">group</span>
            <select id="sgPerfil" class="block w-full pl-11 pr-4 py-3 bg-slate-100 border-none rounded-2xl text-slate-800 focus:ring-2 focus:ring-[#7A2C8F]/20">
              <option value="cliente">Cliente</option>
              <option value="empresa" id="empresaOption">Estabelecimento</option>
            </select>
          </div>
          <p id="empresaRestricao" class="hidden text-xs text-amber-600 bg-amber-50 px-3 py-2 rounded-lg border border-amber-200">
            <span class="material-symbols-outlined text-sm align-middle">info</span>
            Cadastro de estabelecimentos é feito pelo administrador após pagamento.
          </p>
        </div>

        <div class="grid gap-4 md:grid-cols-2">
          <div class="space-y-2 md:col-span-2">
            <label class="block text-xs font-semibold text-slate-600 uppercase tracking-widest pl-1">Nome</label>
            <input id="sgNome" type="text" required class="block w-full px-4 py-3 bg-slate-100 border-none rounded-2xl text-slate-800 focus:ring-2 focus:ring-[#7A2C8F]/20" placeholder="Seu nome completo" />
          </div>
          <div class="space-y-2">
            <label class="block text-xs font-semibold text-slate-600 uppercase tracking-widest pl-1">E-mail</label>
            <input id="sgEmail" type="email" required class="block w-full px-4 py-3 bg-slate-100 border-none rounded-2xl text-slate-800 focus:ring-2 focus:ring-[#7A2C8F]/20" placeholder="voce@email.com" />
          </div>
          <div class="space-y-2">
            <label class="block text-xs font-semibold text-slate-600 uppercase tracking-widest pl-1">Telefone</label>
            <input id="sgTelefone" type="text" class="block w-full px-4 py-3 bg-slate-100 border-none rounded-2xl text-slate-800 focus:ring-2 focus:ring-[#7A2C8F]/20" placeholder="(11) 90000-0000" />
          </div>
        </div>

        <div id="empresaFields" class="hidden grid gap-4 md:grid-cols-2">
          <div class="space-y-2">
            <label class="block text-xs font-semibold text-slate-600 uppercase tracking-widest pl-1">CNPJ</label>
            <input id="sgCnpj" type="text" class="block w-full px-4 py-3 bg-slate-100 border-none rounded-2xl text-slate-800 focus:ring-2 focus:ring-[#7A2C8F]/20" placeholder="00.000.000/0000-00" />
          </div>
          <div class="space-y-2 md:col-span-1">
            <label class="block text-xs font-semibold text-slate-600 uppercase tracking-widest pl-1">Endereco</label>
            <input id="sgEndereco" type="text" class="block w-full px-4 py-3 bg-slate-100 border-none rounded-2xl text-slate-800 focus:ring-2 focus:ring-[#7A2C8F]/20" placeholder="Rua, numero, bairro" />
          </div>
        </div>

        <div class="grid gap-4 md:grid-cols-2">
          <div class="space-y-2">
            <label class="block text-xs font-semibold text-slate-600 uppercase tracking-widest pl-1">Senha</label>
            <input id="sgSenha" type="password" required class="block w-full px-4 py-3 bg-slate-100 border-none rounded-2xl text-slate-800 focus:ring-2 focus:ring-[#7A2C8F]/20" placeholder="Minimo 6 caracteres" />
          </div>
          <div class="space-y-2">
            <label class="block text-xs font-semibold text-slate-600 uppercase tracking-widest pl-1">Confirmar senha</label>
            <input id="sgSenhaConf" type="password" required class="block w-full px-4 py-3 bg-slate-100 border-none rounded-2xl text-slate-800 focus:ring-2 focus:ring-[#7A2C8F]/20" placeholder="Repita a senha" />
          </div>
        </div>

        <label class="inline-flex items-start gap-2 text-sm text-slate-700">
          <input id="sgTerms" type="checkbox" class="rounded mt-0.5" required />
          <span>Li e aceito os termos de uso e politica de privacidade.</span>
        </label>

        <!-- Código de indicação (opcional) -->
        <div id="referralField" class="space-y-1">
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-widest pl-1">Código de indicação <span class="normal-case font-normal">(opcional)</span></label>
          <input id="sgReferralCode" type="text" maxlength="12"
            class="block w-full px-4 py-3 bg-slate-100 border-none rounded-2xl text-slate-800 focus:ring-2 focus:ring-[#7A2C8F]/20 uppercase tracking-widest"
            placeholder="Ex: ABC12XYZ" />
        </div>

        <button type="submit" class="w-full py-4 px-6 bg-gradient-to-r from-[#7A2C8F] to-[#E10098] text-white font-bold rounded-2xl shadow-lg shadow-[#7A2C8F]/20 hover:opacity-95 active:scale-[0.98] transition-all duration-200">
          Criar conta
        </button>
      </form>

      <p class="text-center text-slate-600 text-sm font-medium">
        Ja tem conta?
        <a class="text-[#7A2C8F] font-bold hover:underline underline-offset-4 ml-1" href="/entrar.html">Entrar</a>
      </p>
    </section>
  </main>
</body>
</html>
