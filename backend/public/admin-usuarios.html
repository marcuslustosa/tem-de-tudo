<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerenciar Usurios - Admin Tem de Tudo</title>
<meta name="description" content="Painel administrativo para gerenciar usurios do sistema">
<meta name="theme-color" content="#9b59b6">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Tem de Tudo">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="img/icon-192.png">
<link rel="icon" type="image/png" sizes="32x32" href="img/icon-32.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/css/vivo-styles.css">
<script src="js/config.js"></script>
<script src="js/auth-guard.js"></script>
</head>
</head>
<body>
<!-- HEADER -->
<div class="header">
    <div class="header-top">
        <h1 class="page-title">
            <i class="fas fa-users"></i>
            Gerenciar Usurios
        </h1>
        <a href="admin-dashboard.html" class="back-btn">
            <i class="fas fa-arrow-left"></i>
            Voltar
        </a>
    </div>
</div>

<!-- CONTAINER PRINCIPAL -->
<div class="container">
    <!-- ESTATSTICAS -->
    <div class="stats">
        <div class="stat-card">
            <div class="stat-icon">
                <i class="fas fa-users"></i>
            </div>
            <div class="stat-value" id="totalUsers">11</div>
            <div class="stat-label">Total de Usurios</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background: var(--vivo-green);">
                <i class="fas fa-user-check"></i>
            </div>
            <div class="stat-value" id="activeUsers">9</div>
            <div class="stat-label">Usurios Ativos</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background: var(--vivo-blue);">
                <i class="fas fa-user-friends"></i>
            </div>
            <div class="stat-value" id="clientUsers">6</div>
            <div class="stat-label">Clientes</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background: var(--vivo-orange);">
                <i class="fas fa-building"></i>
            </div>
            <div class="stat-value" id="companyUsers">3</div>
            <div class="stat-label">Empresas</div>
        </div>
    </div>

    <!-- SEO DE USURIOS -->
    <div class="users-section">
        <div class="section-header">
            <h2 class="section-title">
                <i class="fas fa-list"></i>
                Lista de Usurios
            </h2>
            <a href="admin-criar-usuario.html" class="add-btn">
                <i class="fas fa-plus"></i>
                Novo Usurio
            </a>
        </div>

        <!-- FILTROS -->
        <div class="filters">
            <input type="text" class="search-input" placeholder="Buscar por nome, email..." id="searchInput">
            <select class="filter-select" id="typeFilter">
                <option value="">Todos os tipos</option>
                <option value="admin">Administrador</option>
                <option value="empresa">Empresa</option>
                <option value="cliente">Cliente</option>
            </select>
            <select class="filter-select" id="statusFilter">
                <option value="">Todos os status</option>
                <option value="ativo">Ativo</option>
                <option value="inativo">Inativo</option>
            </select>
        </div>

        <!-- TABELA -->
        <div class="table-container">
            <table class="users-table">
                <thead>
                    <tr>
                        <th>Usurio</th>
                        <th>Tipo</th>
                        <th>Status</th>
                        <th>Cadastro</th>
                        <th>Aes</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- Dados sero carregados via JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- PAGINAO -->
        <div class="pagination" id="pagination">
            <button class="page-btn" onclick="previousPage()">
                <i class="fas fa-chevron-left"></i>
            </button>
            <span class="page-info" id="pageInfo">Pgina 1 de 1</span>
            <button class="page-btn" onclick="nextPage()">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>
</div>

<script>
// Dados de exemplo dos usurios
const usersData = [
    { id: 1, name: 'Administrador Sistema', email: 'admin@temdetudo.com', type: 'admin', status: 'ativo', created: '2026-01-15' },
    { id: 2, name: 'Cliente de Teste', email: 'cliente@teste.com', type: 'cliente', status: 'ativo', created: '2026-01-20' },
    { id: 3, name: 'Empresa de Teste', email: 'empresa@teste.com', type: 'empresa', status: 'ativo', created: '2026-01-22' },
    { id: 4, name: 'Maria Silva Santos', email: 'maria@email.com', type: 'cliente', status: 'ativo', created: '2026-01-25' },
    { id: 5, name: 'Joo Pedro Oliveira', email: 'joao@email.com', type: 'cliente', status: 'ativo', created: '2026-01-28' },
    { id: 6, name: 'Ana Carolina Lima', email: 'ana@email.com', type: 'cliente', status: 'ativo', created: '2026-02-01' },
    { id: 7, name: 'Restaurante Sabor da Casa', email: 'contato@sabordacasa.com', type: 'empresa', status: 'ativo', created: '2026-02-05' },
    { id: 8, name: 'Farmcia So Joo', email: 'contato@farmaciajoao.com', type: 'empresa', status: 'ativo', created: '2026-02-08' },
    { id: 9, name: 'Roberto Costa Silva', email: 'roberto@email.com', type: 'cliente', status: 'inativo', created: '2026-02-10' },
    { id: 10, name: 'Patricia Fernandes', email: 'patricia@email.com', type: 'cliente', status: 'inativo', created: '2026-02-12' },
    { id: 11, name: 'Posto Shell Centro', email: 'contato@shellcentro.com', type: 'empresa', status: 'ativo', created: '2026-02-15' }
];

let filteredUsers = [...usersData];
let currentPage = 1;
const usersPerPage = 10;

// Carregamento inicial
window.addEventListener('DOMContentLoaded', function() {
    renderUsers();
    setupFilters();
});

function renderUsers() {
    const tbody = document.getElementById('usersTableBody');
    const start = (currentPage - 1) * usersPerPage;
    const end = start + usersPerPage;
    const usersToShow = filteredUsers.slice(start, end);

    tbody.innerHTML = usersToShow.map(user => `
        <tr>
            <td>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <div class="user-avatar">
                        ${user.name.charAt(0).toUpperCase()}
                    </div>
                    <div class="user-info">
                        <h4>${user.name}</h4>
                        <p>${user.email}</p>
                    </div>
                </div>
            </td>
            <td>
                <span class="user-type ${user.type}">
                    ${user.type}
                </span>
            </td>
            <td>
                <span class="user-status ${user.status}">
                    ${user.status}
                </span>
            </td>
            <td>${formatDate(user.created)}</td>
            <td>
                <div class="actions">
                    <button class="btn-action btn-edit" onclick="editUser(${user.id})" title="Editar">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="btn-action btn-toggle" onclick="toggleUser(${user.id})" title="Ativar/Desativar">
                        <i class="fas fa-toggle-${user.status === 'ativo' ? 'on' : 'off'}"></i>
                    </button>
                    <button class="btn-action btn-delete" onclick="deleteUser(${user.id})" title="Excluir">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </td>
        </tr>
    `).join('');

    updatePagination();
}

function setupFilters() {
    const searchInput = document.getElementById('searchInput');
    const typeFilter = document.getElementById('typeFilter');
    const statusFilter = document.getElementById('statusFilter');

    [searchInput, typeFilter, statusFilter].forEach(element => {
        element.addEventListener('input', filterUsers);
    });
}

function filterUsers() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const typeFilter = document.getElementById('typeFilter').value;
    const statusFilter = document.getElementById('statusFilter').value;

    filteredUsers = usersData.filter(user => {
        const matchesSearch = user.name.toLowerCase().includes(searchTerm) || 
                             user.email.toLowerCase().includes(searchTerm);
        const matchesType = !typeFilter || user.type === typeFilter;
        const matchesStatus = !statusFilter || user.status === statusFilter;

        return matchesSearch && matchesType && matchesStatus;
    });

    currentPage = 1;
    renderUsers();
}

function updatePagination() {
    const totalPages = Math.ceil(filteredUsers.length / usersPerPage);
    const pageInfo = document.getElementById('pageInfo');
    pageInfo.textContent = `Pgina ${currentPage} de ${totalPages}`;
}

function previousPage() {
    if (currentPage > 1) {
        currentPage--;
        renderUsers();
    }
}

function nextPage() {
    const totalPages = Math.ceil(filteredUsers.length / usersPerPage);
    if (currentPage < totalPages) {
        currentPage++;
        renderUsers();
    }
}

function formatDate(dateString) {
    const date = new Date(dateString);
    return date.toLocaleDateString('pt-BR');
}

function editUser(userId) {
    // Implementar edio de usurio
    alert(`Editar usurio ID: ${userId}`);
}

function toggleUser(userId) {
    const user = usersData.find(u => u.id === userId);
    if (user) {
        user.status = user.status === 'ativo' ? 'inativo' : 'ativo';
        renderUsers();
        alert(`Usurio ${user.status === 'ativo' ? 'ativado' : 'desativado'} com sucesso!`);
    }
}

function deleteUser(userId) {
    if (confirm('Tem certeza que deseja excluir este usurio?')) {
        const index = usersData.findIndex(u => u.id === userId);
        if (index > -1) {
            usersData.splice(index, 1);
            filterUsers();
            alert('Usurio excludo com sucesso!');
        }
    }
}
</script>
</body>
</html>
    
    
</head>
</body>
</html>
