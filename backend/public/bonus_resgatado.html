<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bônus resgatado - Tem de Tudo</title>
  <link rel="icon" type="image/png" href="/img/logo.png" />
  <link rel="shortcut icon" href="/img/logo.png" />
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/i9plus-phase8.css?v=20260721-app47" />
</head>
<body class="tdt-receipt-body" data-page="bonus_resgatado">
  <main class="tdt-receipt-wrap">
    <section class="tdt-receipt-card" id="receiptCard">
      <div class="tdt-receipt-hero">
        <div class="tdt-receipt-hero__burst" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
        <div class="tdt-receipt-hero__badge">
          <img id="receiptImage" src="/img/logo.png" alt="" />
        </div>
        <p class="tdt-receipt-hero__kicker" id="receiptKicker">Bônus resgatado</p>
        <h1 class="tdt-receipt-hero__title" id="receiptTitle">Você ganhou!</h1>
      </div>

      <div class="tdt-receipt-info">
        <p class="tdt-receipt-info__company" id="receiptCompany">—</p>
        <p class="tdt-receipt-info__desc" id="receiptDescription">Confirmando seu resgate...</p>

        <div class="tdt-receipt-divider" aria-hidden="true"></div>

        <dl class="tdt-receipt-meta">
          <div>
            <dt>Resgatado em</dt>
            <dd id="receiptDate">—</dd>
          </div>
          <div>
            <dt>Comprovante</dt>
            <dd id="receiptCode">—</dd>
          </div>
        </dl>

        <div class="tdt-receipt-hint" id="receiptHint">
          <span class="material-symbols-outlined" aria-hidden="true">storefront</span>
          <p>Mostre esta tela no balcão para aproveitar seu benefício.</p>
        </div>
      </div>

      <div class="tdt-receipt-actions">
        <a href="/meus_pontos.html" class="tdt-receipt-actions__primary" id="receiptHome">Voltar ao início</a>
        <a href="#" class="tdt-receipt-actions__secondary hidden" id="receiptBackToCompany">Ver página da empresa</a>
      </div>
    </section>
  </main>

  <script src="/dist/stitch-app.min.js?v=20260721-app47"></script>
</body>
</html>
