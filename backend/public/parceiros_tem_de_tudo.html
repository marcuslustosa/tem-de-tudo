<body class="text-[#17171c]" data-page="parceiros_tem_de_tudo">
  <header class="tdt-appbar" id="parcAppbar">
    <div class="tdt-appbar__inner">
      <div class="flex items-center gap-2 min-w-0">
        <button type="button" onclick="if(history.length>1){history.back()}else{location.href='/meus_pontos.html'}" aria-label="Voltar" class="tdt-icon-btn"><span class="material-symbols-outlined">arrow_back</span></button>
        <div class="min-w-0">
          <span class="tdt-appbar__hello" style="font-size:18px">Buscar empresas</span>
        </div>
      </div>
    </div>
  </header>

  <main class="tdt-home">
    <form class="tdt-searchbar" role="search" onsubmit="return false">
      <span class="material-symbols-outlined tdt-searchbar__icon" aria-hidden="true">search</span>
      <input id="parceiroBusca" type="search" placeholder="Nome ou código do comércio" autocomplete="off" enterkeyhint="search" aria-label="Buscar empresas" />
      <button id="parceiroBuscaBtn" type="button" class="btn btn--primary" style="height:38px;min-height:38px;padding:0 16px;border-radius:10px">Buscar</button>
    </form>
    <p id="partnersSearchHint" class="hidden mt-1.5 px-1 text-xs font-semibold text-[#B01774]">No mínimo 4 caracteres!</p>

    <nav class="tdt-chips" aria-label="Categorias">
      <button class="parceiro-filtro-btn tdt-chip is-active" type="button" data-category-key="todos"><span class="material-symbols-outlined">grid_view</span>Tudo</button>
      <button class="parceiro-filtro-btn tdt-chip" type="button" data-category-key="restaurantes"><span class="material-symbols-outlined">restaurant</span>Restaurantes</button>
      <button class="parceiro-filtro-btn tdt-chip" type="button" data-category-key="sorveterias"><span class="material-symbols-outlined">icecream</span>Sorveterias</button>
      <button class="parceiro-filtro-btn tdt-chip" type="button" data-category-key="bares"><span class="material-symbols-outlined">local_bar</span>Bares</button>
      <button class="parceiro-filtro-btn tdt-chip" type="button" data-category-key="japonesa"><span class="material-symbols-outlined">ramen_dining</span>Japonesa</button>
      <button class="parceiro-filtro-btn tdt-chip" type="button" data-category-key="petshops"><span class="material-symbols-outlined">pets</span>Petshops</button>
      <button class="parceiro-filtro-btn tdt-chip" type="button" data-category-key="beleza"><span class="material-symbols-outlined">content_cut</span>Beleza</button>
    </nav>

    <section class="tdt-section" style="margin-top:18px">
      <div class="tdt-section__head">
        <h2 class="tdt-section__title">Empresas</h2>
      </div>

      <div id="partners-skeleton" class="tdt-list hidden">
        <div class="tdt-skel-row"><div class="tdt-skel-box" style="width:60px;height:60px"></div><div style="flex:1"><div class="tdt-skel-box" style="width:55%;height:14px"></div><div class="tdt-skel-box" style="width:35%;height:11px;margin-top:8px"></div></div></div>
        <div class="tdt-skel-row"><div class="tdt-skel-box" style="width:60px;height:60px"></div><div style="flex:1"><div class="tdt-skel-box" style="width:45%;height:14px"></div><div class="tdt-skel-box" style="width:40%;height:11px;margin-top:8px"></div></div></div>
        <div class="tdt-skel-row"><div class="tdt-skel-box" style="width:60px;height:60px"></div><div style="flex:1"><div class="tdt-skel-box" style="width:50%;height:14px"></div><div class="tdt-skel-box" style="width:30%;height:11px;margin-top:8px"></div></div></div>
      </div>

      <div id="partners-empty" class="hidden tdt-empty">
        <div class="tdt-empty__icon"><span class="material-symbols-outlined">storefront</span></div>
        <p data-empty-title>Nenhuma empresa encontrada.</p>
        <p data-empty-subtitle class="mt-1">Tente outro nome ou categoria.</p>
      </div>

      <div id="partners-error" class="hidden tdt-empty">
        <div class="tdt-empty__icon"><span class="material-symbols-outlined">wifi_off</span></div>
        <p>Não foi possível carregar as empresas.</p>
        <button id="partners-retry" type="button" class="btn btn--neutral mt-3">Tentar novamente</button>
      </div>

      <div id="partners-grid" class="tdt-list"></div>

      <div class="mt-4 flex justify-center">
        <button id="partners-load-more" type="button" class="hidden btn btn--neutral">Ver mais empresas</button>
      </div>
    </section>
  </main>

  <script src="/dist/stitch-app.min.js?v=20260719-app12"></script>
  <script>
    (function () {
      // Garante que a lista de categorias começa no "Tudo" (sem rolagem inicial).
      function resetChips() { var c = document.querySelector('.tdt-chips'); if (c) c.scrollLeft = 0; }
      window.addEventListener('load', function () { resetChips(); setTimeout(resetChips, 300); });
      // App bar ganha borda ao rolar.
      var bar = document.getElementById('parcAppbar');
      if (bar) {
        var onScroll = function () { bar.classList.toggle('is-stuck', window.scrollY > 4); };
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
      }
    })();
  </script>
</body>
</html>
