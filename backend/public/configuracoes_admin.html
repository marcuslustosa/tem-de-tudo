<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tem de Tudo - Configuracoes</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body { font-family: 'Be Vietnam Pro', sans-serif; }
    .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
  </style>
</head>
<body data-page="configuracoes_admin" class="bg-[#f8f5fe] text-[#2e2e34] min-h-screen">
  <aside class="hidden lg:flex fixed left-0 top-0 h-full w-64 flex-col bg-white shadow-[0_8px_32px_rgba(11,31,58,0.08)] z-40">
    <div class="px-6 py-7 space-y-1">
      <img src="/img/logo.png" alt="Tem de Tudo" class="h-8 w-auto" onerror="this.onerror=null;this.src='/img/logo.png.png';" />
      <p class="text-xs font-semibold text-[#77767d]">Tem de Tudo</p>
    </div>
    <nav class="flex-1 px-3 space-y-1">
      <a href="/dashboard_admin_master.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-[#f2eff9] transition-colors font-headline text-sm font-semibold"><span class="material-symbols-outlined">dashboard</span>Dashboard</a>
      <a href="/gest_o_de_estabelecimentos.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-[#f2eff9] transition-colors font-headline text-sm font-semibold"><span class="material-symbols-outlined">storefront</span>Estabelecimentos</a>
      <a href="/gest_o_de_usu_rios_master.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-[#f2eff9] transition-colors font-headline text-sm font-semibold"><span class="material-symbols-outlined">group</span>Usuarios</a>
      <a href="/relat_rios_gerais_master.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-[#f2eff9] transition-colors font-headline text-sm font-semibold"><span class="material-symbols-outlined">analytics</span>Relatorios</a>
      <a href="/banners_e_categorias_master.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-[#f2eff9] transition-colors font-headline text-sm font-semibold"><span class="material-symbols-outlined">collections</span>Conteudo</a>
      <a href="/configuracoes_admin.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-[#f8f5fe] border-r-4 border-[#E10098] text-[#E10098] font-headline text-sm font-semibold"><span class="material-symbols-outlined">settings</span>Configuracoes</a>
    </nav>
    <div class="p-6">
      <a href="/entrar.html" class="inline-flex items-center gap-2 text-sm font-semibold text-[#b41340]"><span class="material-symbols-outlined">logout</span>Sair</a>
    </div>
  </aside>

  <header class="sticky top-0 z-30 bg-[#f8f5fe]/95 backdrop-blur border-b border-[#dedbe7] lg:pl-64">
    <div class="px-6 py-4 flex items-center justify-between">
      <h1 class="font-headline text-2xl font-extrabold">Configuracoes da Plataforma</h1>
      <a href="/dashboard_admin_master.html" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-white border border-[#dedbe7] text-sm font-semibold hover:bg-[#f2eff9] transition-colors">
        <span class="material-symbols-outlined text-base">arrow_back</span>Voltar
      </a>
    </div>
  </header>

  <main class="px-6 py-8 space-y-6 lg:ml-64">
    <section class="bg-white rounded-2xl border border-[#dedbe7] p-6 space-y-4">
      <h2 class="font-headline text-lg font-bold">Dados Gerais</h2>
      <div class="grid md:grid-cols-2 gap-4">
        <label class="space-y-2">
          <span class="text-sm font-semibold">Nome da plataforma</span>
          <input id="cfgPlatformName" type="text" class="w-full rounded-xl border-[#dedbe7] focus:border-[#7A2C8F] focus:ring-[#7A2C8F]/20" />
        </label>
        <label class="space-y-2">
          <span class="text-sm font-semibold">Email de suporte</span>
          <input id="cfgSupportEmail" type="email" class="w-full rounded-xl border-[#dedbe7] focus:border-[#7A2C8F] focus:ring-[#7A2C8F]/20" />
        </label>
      </div>
      <label class="space-y-2 block">
        <span class="text-sm font-semibold">WhatsApp de suporte</span>
        <input id="cfgSupportWhatsapp" type="text" class="w-full rounded-xl border-[#dedbe7] focus:border-[#7A2C8F] focus:ring-[#7A2C8F]/20" />
      </label>
    </section>

    <section class="bg-white rounded-2xl border border-[#dedbe7] p-6 space-y-4">
      <h2 class="font-headline text-lg font-bold">Regra de Pontos</h2>
      <div class="grid md:grid-cols-2 gap-4">
        <label class="space-y-2">
          <span class="text-sm font-semibold">Pontos base por R$ 1,00</span>
          <input id="cfgPointsBase" type="number" step="0.1" min="0" class="w-full rounded-xl border-[#dedbe7] focus:border-[#7A2C8F] focus:ring-[#7A2C8F]/20" />
        </label>
        <label class="space-y-2">
          <span class="text-sm font-semibold">Expiracao dos pontos (dias)</span>
          <input id="cfgPointsExpiration" type="number" min="1" class="w-full rounded-xl border-[#dedbe7] focus:border-[#7A2C8F] focus:ring-[#7A2C8F]/20" />
        </label>
      </div>
    </section>

    <section class="bg-white rounded-2xl border border-[#dedbe7] p-6 space-y-4">
      <h2 class="font-headline text-lg font-bold">Permissoes Globais</h2>
      <div class="grid md:grid-cols-2 gap-3">
        <label class="inline-flex items-center gap-3 p-3 rounded-xl bg-[#f8f5fe] border border-[#dedbe7]"><input id="cfgAllowCliente" type="checkbox" class="rounded border-[#b00076] text-[#b00076] focus:ring-[#b00076]/20" />Cadastro publico de clientes</label>
        <label class="inline-flex items-center gap-3 p-3 rounded-xl bg-[#f8f5fe] border border-[#dedbe7]"><input id="cfgAllowEmpresa" type="checkbox" class="rounded border-[#b00076] text-[#b00076] focus:ring-[#b00076]/20" />Cadastro publico de empresas</label>
        <label class="inline-flex items-center gap-3 p-3 rounded-xl bg-[#f8f5fe] border border-[#dedbe7]"><input id="cfgPushEnabled" type="checkbox" class="rounded border-[#b00076] text-[#b00076] focus:ring-[#b00076]/20" />Notificacoes push habilitadas</label>
        <label class="inline-flex items-center gap-3 p-3 rounded-xl bg-[#f8f5fe] border border-[#dedbe7]"><input id="cfgMaintenanceMode" type="checkbox" class="rounded border-[#b00076] text-[#b00076] focus:ring-[#b00076]/20" />Modo manutencao</label>
      </div>
    </section>

    <section class="flex flex-wrap gap-3">
      <button id="cfgSaveBtn" type="button" class="inline-flex items-center gap-2 px-5 py-3 rounded-xl bg-gradient-to-r from-[#7A2C8F] to-[#E10098] text-white font-bold hover:opacity-90 transition-opacity">
        <span class="material-symbols-outlined text-base">save</span>Salvar configuracoes
      </button>
      <button id="cfgReloadBtn" type="button" class="inline-flex items-center gap-2 px-5 py-3 rounded-xl bg-white border border-[#dedbe7] text-[#2e2e34] font-semibold hover:bg-[#f2eff9] transition-colors">
        <span class="material-symbols-outlined text-base">refresh</span>Recarregar
      </button>
    </section>
  </main>

  <script src="/js/stitch-app.js?v=20260421-authfix"></script>
</body>
</html>
