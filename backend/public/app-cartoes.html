<script>
function adicionarCartao() {
    alert('?? Adicionar novo cartão\n\nFuncionalidade em desenvolvimento!\n\nEm breve você poderá:\n• Adicionar cartões de crédito e débito\n• Validação automática de dados\n• Segurança bancária certificada');
}

function editarCartao(id) {
    showToast('?? Abrir editor de cartão #' + id);
}

function verDetalhes(id) {
    const cartoes = {
        'visa1234': {
            nome: 'VISA **** 1234',
            banco: 'Banco do Brasil',
            tipo: 'Crédito',
            limite: 'R$ 5.000,00',
            fatura: 'R$ 1.247,50'
        },
        'master5678': {
            nome: 'MASTERCARD **** 5678',
            banco: 'Itaú',
            tipo: 'Débito',
            limite: 'Sem limite',
            fatura: 'N/A'
        }
    };
    
    const cartao = cartoes[id];
    if (cartao) {
        alert(`?? ${cartao.nome}\n\n?? Banco: ${cartao.banco}\n?? Tipo: ${cartao.tipo}\n?? Limite: ${cartao.limite}\n?? Fatura atual: ${cartao.fatura}`);
    }
}

function removerCartao(id) {
    if (confirm('?? Tem certeza que deseja remover este cartão?\n\nEsta ação não pode ser desfeita.')) {
        showToast('??? Cartão removido com sucesso!');
        // Simular remoção visual
        setTimeout(() => {
            showToast('?? Dados atualizados!');
        }, 1500);
    }
}

function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.style.animation = 'slideUp 0.3s ease';
        setTimeout(() => document.body.removeChild(toast), 300);
    }, 2500);
}

// Simulação de carregamento
document.addEventListener('DOMContentLoaded', () => {
    console.log('?? Sistema de cartões carregado!');
});
</script>
