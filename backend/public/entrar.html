<!DOCTYPE html>
<html class="light" lang="pt-BR"><head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tem de Tudo - Login</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background-color: #f8f5fe;
      min-height: max(884px, 100dvh);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .bg-radiant-pattern {
      background: radial-gradient(circle at 0% 0%, #003B49 0%, transparent 50%),
                  radial-gradient(circle at 100% 100%, #7A2C8F 0%, transparent 50%),
                  radial-gradient(circle at 100% 0%, #E10098 0%, transparent 40%);
      background-color: #f8f5fe;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-radiant-pattern" data-page="acessar_conta">
  <main class="w-full max-w-md space-y-8">
    <div class="text-center space-y-6">
      <div class="inline-flex items-center justify-center p-4 rounded-3xl bg-surface-container-lowest shadow-[0_8px_32px_rgba(11,31,58,0.08)]">
        <img alt="Tem de Tudo" src="/img/logo.png" onerror="this.onerror=null;this.src='/img/logo.png.png';" class="h-12 w-auto" />
      </div>
      <div class="space-y-2">
        <h1 class="text-2xl font-bold text-on-surface font-headline leading-tight">Bem-vindo de volta</h1>
        <p class="text-on-surface-variant text-sm font-medium">Acesse sua conta para aproveitar ofertas exclusivas.</p>
      </div>
    </div>

    <div class="glass-card rounded-3xl p-8 shadow-[0_20px_50px_rgba(11,31,58,0.12)] space-y-6">
      <div id="loginMessage" class="hidden text-sm font-semibold px-4 py-3 rounded-xl"></div>
      <form class="space-y-5" id="loginForm" action="javascript:void(0);">
        <div class="space-y-2">
          <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest pl-1">CPF ou E-mail</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
              <span class="material-symbols-outlined text-[20px]">person</span>
            </div>
            <input id="loginEmail" class="block w-full pl-11 pr-4 py-4 bg-surface-container-low border-none rounded-2xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all duration-200" placeholder="000.000.000-00" type="text" />
          </div>
        </div>
        <div class="space-y-2">
          <div class="flex justify-between items-center px-1">
            <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest">Senha</label>
            <a class="text-xs font-semibold text-secondary hover:text-primary transition-colors" href="/forgot_password.html">Esqueci minha senha</a>
          </div>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
              <span class="material-symbols-outlined text-[20px]">lock</span>
            </div>
            <input id="loginPassword" class="block w-full pl-11 pr-12 py-4 bg-surface-container-low border-none rounded-2xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all duration-200" placeholder="********" type="password" />
            <button id="togglePass" class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-on-surface-variant" type="button">
              <span id="toggleIcon" class="material-symbols-outlined text-[20px]">visibility</span>
            </button>
          </div>
        </div>
        <button class="w-full py-4 px-6 bg-[#7A2C8F] text-white font-bold rounded-2xl shadow-lg hover:opacity-95 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 mt-4" type="submit">
          <span>Entrar</span>
          <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
        </button>
      </form>
    </div>

    <p class="text-center text-on-surface-variant font-medium">Ainda nao tem conta?<a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="/criar_conta.html">Criar conta</a></p>
  </main>

  <div class="fixed top-20 -left-12 w-64 h-64 bg-tertiary/10 rounded-full blur-3xl -z-10"></div>
  <div class="fixed bottom-20 -right-12 w-80 h-80 bg-primary/10 rounded-full blur-3xl -z-10"></div>

  <div class="fixed bottom-8 right-8">
    <button class="w-14 h-14 bg-surface-container-lowest rounded-full shadow-xl flex items-center justify-center text-primary hover:scale-110 active:scale-95 transition-all duration-300">
      <span class="material-symbols-outlined" data-weight="fill">chat_bubble</span>
    </button>
  </div>

  <script>window.__inlineLoginManaged = true;</script>
  <script src="/js/stitch-app.js?v=20260401-stab8"></script>
  <script>

    (function () {
      const passInput = document.getElementById('loginPassword');
      const toggleBtn = document.getElementById('togglePass');
      const toggleIcon = document.getElementById('toggleIcon');
      if (passInput && toggleBtn && toggleIcon) {
        toggleBtn.addEventListener('click', () => {
          const isHidden = passInput.type === 'password';
          passInput.type = isHidden ? 'text' : 'password';
          toggleIcon.textContent = isHidden ? 'visibility_off' : 'visibility';
        });
      }
    })();

    (function () {
      const form = document.getElementById('loginForm');
      const emailInput = document.getElementById('loginEmail');
      const passInput = document.getElementById('loginPassword');
      const msgBox = document.getElementById('loginMessage');
      const redirectMap = {
        cliente: '/meus_pontos.html',
        empresa: '/dashboard_parceiro.html',
        admin: '/dashboard_admin_master.html'
      };

      function showMsg(text, variant) {
        if (!msgBox) return;
        const palette = {
          error: 'bg-rose-50 text-rose-800 border border-rose-100',
          success: 'bg-emerald-50 text-emerald-800 border border-emerald-100',
          info: 'bg-blue-50 text-blue-800 border border-blue-100'
        };
        if (!text) {
          msgBox.className = 'hidden text-sm font-semibold px-4 py-3 rounded-xl';
          msgBox.textContent = '';
          return;
        }
        msgBox.className = 'text-sm font-semibold px-4 py-3 rounded-xl ' + (palette[variant] || palette.error);
        msgBox.textContent = text;
      }

      if (!form || !emailInput || !passInput) return;

      const normalizePerfil = (rawPerfil) => {
        const value = (rawPerfil || '').toString().toLowerCase().trim();
        if (['admin', 'administrador', 'master', 'admin_master', 'administrador_master', 'admin master'].includes(value)) return 'admin';
        if (['empresa', 'estabelecimento', 'parceiro', 'lojista'].includes(value)) return 'empresa';
        if (['cliente', 'customer'].includes(value)) return 'cliente';
        return value || null;
      };

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        showMsg('', 'info');
        const email = emailInput?.value?.trim() || '';
        const password = passInput?.value || '';

        if (!email || !password) {
          showMsg('Informe email/CPF e senha.', 'error');
          return;
        }

        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json'
            },
            body: JSON.stringify({ email, password })
          });

          const data = await res.json().catch(() => ({}));
          const token = data?.token || data?.access_token || data?.data?.token;
          const userRaw = data?.user || data?.data?.user || data?.usuario;

          if (!res.ok || !token || !userRaw) {
            console.error('LOGIN_INLINE_FAIL', { status: res.status, payload: data });
            showMsg(data?.message || 'Nao foi possivel entrar.', 'error');
            return;
          }

          const perfil = normalizePerfil(userRaw.perfil || userRaw.role || userRaw.tipo);
          const target = redirectMap[perfil] || '/meus_pontos.html';
          const user = { ...userRaw, perfil: perfil || userRaw.perfil || userRaw.role || userRaw.tipo || null };

          localStorage.setItem('tem_de_tudo_token', token);
          localStorage.setItem('tem_de_tudo_user', JSON.stringify(user));

          console.log('LOGIN_INLINE_OK', { status: res.status, perfil, redirect: target, payload: data });
          showMsg('Login realizado, redirecionando...', 'success');
          setTimeout(() => { window.location.href = target; }, 150);
        } catch (err) {
          console.error('LOGIN_INLINE_FAIL', err);
          showMsg('Erro de rede ou servidor. Tente novamente.', 'error');
        }
      });
    })();
  </script>
</body></html>
