<!doctype html>
<html class="light" lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tem de Tudo - Recuperar Senha</title>  <link rel="icon" type="image/png" href="/img/logo.png" />
  <link rel="shortcut icon" href="/img/logo.png" />
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: "Inter", sans-serif;
      background-color: #f8f5fe;
      min-height: 100dvh;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
  </style>
  <script src="/dist/stitch-app.min.js?v=20260721-app45" defer></script>
  <link rel="stylesheet" href="/css/i9plus-phase8.css?v=20260721-app45" />
</head>
<body data-page="forgot_password" class="min-h-screen flex items-center justify-center p-4 bg-white">
  <main class="w-full max-w-md space-y-8">
    <header class="text-center space-y-4">
      <div class="inline-flex items-center justify-center p-4 rounded-3xl bg-white shadow-[0_8px_32px_rgba(11,31,58,0.08)]">
        <img alt="Tem de Tudo" src="/img/logo.png" onerror="this.onerror=null;this.src='/img/logo.png.png';" class="h-12 w-auto" />
      </div>
      <h1 class="text-2xl font-bold text-slate-900">Recuperar senha</h1>
      <p class="text-sm text-slate-600">Informe seu e-mail para receber o link de recuperação.</p>
    </header>

    <section class="glass-card rounded-3xl p-8 shadow-[0_20px_50px_rgba(11,31,58,0.12)]">
      <form class="space-y-4">
        <label class="block text-xs font-semibold text-slate-600 uppercase tracking-widest pl-1">E-mail</label>
        <input id="fpEmail" type="email" required class="block w-full px-4 py-3 bg-slate-100 border-none rounded-2xl text-slate-800 focus:ring-2 focus:ring-[#133f8c]/20" placeholder="voce@email.com" />
        <button type="submit" class="w-full py-4 px-6 bg-[#5b21b6] text-white font-bold rounded-2xl shadow-lg shadow-[#133f8c]/20 hover:opacity-95 active:scale-[0.98] transition-all duration-200">
          Enviar link
        </button>
      </form>

      <p class="text-center text-sm text-slate-600 mt-4">
        <a class="text-[#111b3f] font-bold hover:underline underline-offset-4" href="/entrar.html">Voltar ao login</a>
      </p>
    </section>
  </main>
</body>
</html>
