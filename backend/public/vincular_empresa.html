<!DOCTYPE html>

<head>

  <title>Vincular Empresa - Tem de Tudo</title>

  <style>
    body {
      font-family: 'Inter', Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0, 175, 168, 0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(176, 23, 116, 0.2), transparent 24%),

        <button id="companyLinkSecondary" class="inline-flex h-12 items-center justify-center rounded-full border border-white/30 bg-white/5 px-5 text-sm font-bold text-white">Criar conta</button>
