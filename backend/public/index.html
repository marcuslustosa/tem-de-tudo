<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#133F8C" />
  <title>Tem de Tudo</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/img/logo.png" />
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png" />
  <link rel="stylesheet" href="/css/i9plus-phase8.css?v=20260721-app38" />
  <script>
    // Sem pagina de marketing: vai direto pro app.
    // Logado -> painel do perfil; deslogado -> login.
    (function () {
      try {
        var token = localStorage.getItem('tem_de_tudo_token');
        var raw = localStorage.getItem('tem_de_tudo_user');
        var perfil = null;
        if (raw) {
          try { var u = JSON.parse(raw); perfil = String(u.perfil || u.role || u.tipo || '').toLowerCase(); } catch (e) {}
        }
        var map = {
          cliente: '/meus_pontos.html',
          empresa: '/dashboard_parceiro.html',
          admin: '/dashboard_admin_master.html',
          administrador: '/dashboard_admin_master.html',
          master: '/dashboard_admin_master.html',
          revenda: '/revenda_painel.html'
        };
        var dest = (token && map[perfil]) ? map[perfil] : '/entrar.html';
        window.location.replace(dest);
      } catch (e) {
        window.location.replace('/entrar.html');
      }
    })();
  </script>
</head>
<body data-page="redirect_bridge">
  <main class="redirect-card">
    <div class="redirect-logo">
      <img src="/img/logo.png" alt="Tem de Tudo" class="h-12 w-auto" onerror="this.onerror=null;this.src='/img/logo.png.png';" />
    </div>
    <p class="mt-4 text-sm text-white/84">Abrindo o app… se não abrir, <a href="/entrar.html">clique aqui</a>.</p>
  </main>
</body>
</html>
