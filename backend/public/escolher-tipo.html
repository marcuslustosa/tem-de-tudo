<!doctype html>
<html class="light" lang="pt-BR">

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: "Inter", sans-serif;
      background-color: #f8f5fe;
      min-height: 100dvh;
    }
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);

    }
  </style>
  <script src="/dist/stitch-app.min.js?v=20260721-app47" defer></script>

<body data-page="escolher-tipo" class="min-h-screen flex items-center justify-center p-4 bg-white">
  <main class="w-full max-w-3xl space-y-8">
    <header class="text-center space-y-5">
      <div class="inline-flex items-center justify-center p-4 rounded-3xl bg-white shadow-[0_8px_32px_rgba(11,31,58,0.08)]">
        <img alt="Tem de Tudo" src="/img/logo.png" onerror="this.onerror=null;this.src='/img/logo.png.png';" class="h-12 w-auto" />
      </div>
      <div class="space-y-2">
        <h1 class="text-2xl font-bold text-slate-900 font-headline">Como você quer acessar</h1>
        <p class="text-slate-600 text-sm font-medium">Escolha o perfil para seguir com login ou cadastro.</p>
      </div>
    </header>

    <section class="grid gap-4 md:grid-cols-2">
      <a href="/criar_conta.html?tipo=cliente" class="glass-card rounded-3xl p-6 border border-white/60 shadow-[0_12px_30px_rgba(11,31,58,0.10)] hover:translate-y-[-2px] transition">
        <div class="w-12 h-12 rounded-2xl bg-[#4c1d95]/10 text-[#111b3f] flex items-center justify-center mb-4">
          <span class="material-symbols-outlined">person</span>
        </div>
        <h2 class="text-lg font-bold text-slate-900">Sou Cliente</h2>
        <p class="text-sm text-slate-600 mt-1">Quero acumular pontos e resgatar recompensas.</p>
      </a>
      <a href="/criar_conta.html?tipo=empresa" class="glass-card rounded-3xl p-6 border border-white/60 shadow-[0_12px_30px_rgba(11,31,58,0.10)] hover:translate-y-[-2px] transition">

          <span class="material-symbols-outlined">storefront</span>
        </div>
        <h2 class="text-lg font-bold text-slate-900">Sou Estabelecimento</h2>
        <p class="text-sm text-slate-600 mt-1">Quero criar campanhas e fidelizar clientes.</p>
      </a>
    </section>

    <p class="text-center text-slate-600 text-sm font-medium">
      Já tem conta?
      <a href="/entrar.html" class="text-[#111b3f] font-bold hover:underline underline-offset-4 ml-1">Entrar</a>
    </p>
  </main>

</html>
