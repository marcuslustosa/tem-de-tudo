<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Entrar | Tem de Tudo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.10/dist/tailwind.min.css">
  <script src="/js/stitch-app.js" defer></script>
</head>
<body data-page="acessar_conta" class="min-h-screen bg-slate-50 text-slate-900 flex items-center justify-center">
  <noscript><div class="p-4 text-red-600 text-sm">Ative o JavaScript para usar o aplicativo.</div></noscript>
  <main class="w-full max-w-md bg-white shadow-lg rounded-2xl p-6 space-y-4">
    <div class="text-center">
      <h1 class="text-2xl font-bold">Entrar</h1>
      <p class="text-sm text-slate-600">Use seu e-mail e senha cadastrados.</p>
    </div>
    <form class="space-y-3">
      <input class="w-full border rounded-lg px-3 py-2" type="email" placeholder="E-mail" required />
      <input class="w-full border rounded-lg px-3 py-2" type="password" placeholder="Senha" required />
      <button class="w-full bg-indigo-600 text-white font-semibold px-4 py-2 rounded-lg" type="submit">Entrar</button>
    </form>
    <div class="text-sm text-center">
      <a class="text-indigo-600 font-semibold" href="/forgot_password.html">Esqueci minha senha</a>
    </div>
  </main>
</body>
</html>
