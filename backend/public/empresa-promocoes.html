<body>
<div class="header">
<div class="header-content">
<!-- Logo Section -->
<div class="tdt-inline-2102c894">
<i class="fas fa-gem tdt-inline-6555f428"></i>
<span>Tem de Tudo</span>
<span class="tdt-inline-a53cbab0">EMPRESA</span>
</div>
</div>
<div class="header-top">
<button class="back-btn" onclick="history.back()">
<i class="fas fa-arrow-left"></i>
</button>
<div>
<h1>Promoções</h1>
<p id="totalInfo">Carregando...</p>
</div>
</div>
<button class="add-btn" onclick="openModal()">
<i class="fas fa-plus"></i> Nova Promoção
        </button>
</div>
<div class="content">
<div class="loading" id="loading">
<i class="fas fa-spinner fa-spin"></i>
<p>Carregando promo??es...</p>
</div>
<div class="promo-list tdt-inline-cb458930" id="promo-list"></div>
<div class="empty-state tdt-inline-cb458930" id="empty-state">
<i class="fas fa-gift"></i>
<p>Nenhuma promo??o cadastrada</p>
<small class="tdt-inline-406d150a">Clique em "Nova Promoção" para criar</small>
</div>
</div>
<!-- Modal de Criar/Editar -->
<div class="modal" id="promoModal">
<div class="modal-content">
<div class="modal-header">
<h2 id="modalTitle">Nova Promoção</h2>
<button class="close-btn" onclick="closeModal()">
<i class="fas fa-times"></i>
</button>
</div>
<form id="promoForm" onsubmit="handleSubmit(event)">
<input id="promoId" type="hidden"/>
<div class="form-group">
<label class="form-label">Nome da Promo??o *</label>
<input class="form-input" id="nome" placeholder="Ex: Desconto de 15%" required="" type="text"/>
</div>
<div class="form-group">
<label class="form-label">Descri??o</label>
<textarea class="form-textarea" id="descricao" placeholder="Descreva os detalhes da promo??o..."></textarea>
</div>
<div class="form-group">
<label class="form-label">Tipo de Promo??o *</label>
<select class="form-select" id="tipo" required="">
<option value="">Selecione...</option>
<option value="desconto">Desconto</option>
<option value="dobro">Dobro de Pontos</option>
<option value="brinde">Brinde</option>
<option value="cashback">Cashback</option>
</select>
</div>
<div class="form-group">
<label class="form-label">Pontos Necess?rios</label>
<input class="form-input" id="pontos_necessarios" min="0" placeholder="0" type="number"/>
</div>
<div class="form-group">
<label class="form-label">Data de In?cio</label>
<input class="form-input" id="data_inicio" type="date"/>
</div>
<div class="form-group">
<label class="form-label">Data de T?rmino</label>
<input class="form-input" id="data_fim" type="date"/>
</div>
<div class="form-group">
<label class="form-checkbox">
<input checked="" id="ativo" type="checkbox"/>
<span>Promo??o ativa</span>
</label>
</div>
<button class="btn-submit" id="submitBtn" type="submit">
<i class="fas fa-save"></i> Salvar Promo??o
                </button>
</form>
</div>
</div>
<!-- Modal de Confirma??o -->
<div class="modal" id="confirmModal">
<div class="modal-content tdt-inline-88efe206">
<div class="modal-header">
<h2>Confirmar Exclus?o</h2>
<button class="close-btn" onclick="closeConfirmModal()">
<i class="fas fa-times"></i>
</button>
</div>
<p class="tdt-inline-1abf0d52">Tem certeza que deseja excluir esta promo??o?</p>
<div class="tdt-inline-9c68691e">
<button class="btn-action btn-edit tdt-inline-da5cd676" onclick="closeConfirmModal()">
                    Cancelar
                </button>
<button class="btn-action btn-delete tdt-inline-da5cd676" onclick="confirmDelete()">
                    Excluir
                </button>
</div>
</div>
</div>
<script>
        let promocoes = [];
        let deleteId = null;
        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'entrar.html';
                return false;
            }
            return token;
        }
        async function loadPromocoes() {
            const token = checkAuth();
            if (!token) return;
            try {
                const response = await fetch('/api/empresa/promocoes', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });
                if (response.ok) {
                    const result = await response.json();
                    promocoes = result.data || [];
                    if (promocoes.length > 0) {
                        renderPromocoes();
                    } else {
                        showEmptyState();
                    }
                } else if (response.status === 401) {
                    window.location.href = 'entrar.html';
                } else {
                    showEmptyState();
                }
            } catch (error) {
                console.error('Erro ao carregar promo??es:', error);
                showEmptyState();
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        function renderPromocoes() {
            const list = document.getElementById('promo-list');
            list.innerHTML = promocoes.map(promo => {
                const ativo = promo.ativo == 1;
                const dataInicio = promo.data_inicio ? new Date(promo.data_inicio).toLocaleDateString('pt-BR') : 'N?o definida';
                const dataFim = promo.data_fim ? new Date(promo.data_fim).toLocaleDateString('pt-BR') : 'N?o definida';
                return `
                    <div class="promo-card">
<div class="promo-badge ${ativo ? 'badge-ativo' : 'badge-inativo'}">
                            ${ativo ? 'Ativa' : 'Inativa'}
                        </div>
<div class="promo-header">
<div class="promo-nome">${promo.nome}</div>
                            ${promo.descricao ? `<div class="promo-descricao">${promo.descricao}</div>` : ''}
                        </div>
<div class="promo-info">
<div class="promo-info-item">
<div class="promo-info-label">Tipo</div>
<div class="promo-info-value">${getTipoLabel(promo.tipo)}</div>
</div>
<div class="promo-info-item">
<div class="promo-info-label">Pontos</div>
<div class="promo-info-value">${promo.pontos_necessarios || 0}</div>
</div>
<div class="promo-info-item">
<div class="promo-info-label">In?cio</div>
<div class="promo-info-value" style="font-size: 11px;">${dataInicio}</div>
</div>
<div class="promo-info-item">
<div class="promo-info-label">Fim</div>
<div class="promo-info-value" style="font-size: 11px;">${dataFim}</div>
</div>
</div>
<div class="promo-actions">
<button class="btn-action btn-edit" onclick="editPromocao(${promo.id})">
<i class="fas fa-edit"></i> Editar
                            </button>
<button class="btn-action btn-delete" onclick="deletePromocao(${promo.id})">
<i class="fas fa-trash"></i> Excluir
                            </button>
</div>
</div>
                `;
            }).join('');
            list.style.display = 'grid';
            document.getElementById('totalInfo').textContent = `${promocoes.length} ${promocoes.length === 1 ? 'promo??o' : 'promo??es'}`;
        }
        function getTipoLabel(tipo) {
            const tipos = {
                'desconto': 'Desconto',
                'dobro': 'Dobro de Pontos',
                'brinde': 'Brinde',
                'cashback': 'Cashback'
            };
            return tipos[tipo] || tipo;
        }
        function openModal(promo = null) {
            const modal = document.getElementById('promoModal');
            const form = document.getElementById('promoForm');
            form.reset();
            if (promo) {
                document.getElementById('modalTitle').textContent = 'Editar Promo??o';
                document.getElementById('promoId').value = promo.id;
                document.getElementById('nome').value = promo.nome;
                document.getElementById('descricao').value = promo.descricao || '';
                document.getElementById('tipo').value = promo.tipo;
                document.getElementById('pontos_necessarios').value = promo.pontos_necessarios || 0;
                document.getElementById('data_inicio').value = promo.data_inicio || '';
                document.getElementById('data_fim').value = promo.data_fim || '';
                document.getElementById('ativo').checked = promo.ativo == 1;
                document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save"></i> Atualizar Promo??o';
            } else {
                document.getElementById('modalTitle').textContent = 'Nova Promoção';
                document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save"></i> Salvar Promo??o';
            }
            modal.classList.add('show');
        }
        function closeModal() {
            document.getElementById('promoModal').classList.remove('show');
        }
        function editPromocao(id) {
            const promo = promocoes.find(p => p.id === id);
            if (promo) {
                openModal(promo);
            }
        }
        function deletePromocao(id) {
            deleteId = id;
            document.getElementById('confirmModal').classList.add('show');
        }
        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('show');
            deleteId = null;
        }
        async function confirmDelete() {
            if (!deleteId) return;
            const token = checkAuth();
            if (!token) return;
            try {
                const response = await fetch(`/api/empresa/promocoes/${deleteId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });
                if (response.ok) {
                    closeConfirmModal();
                    loadPromocoes();
                } else {
                    alert('Erro ao excluir promo??o');
                }
            } catch (error) {
                console.error('Erro ao excluir:', error);
                alert('Erro ao excluir promo??o');
            }
        }
        async function handleSubmit(e) {
            e.preventDefault();
            const token = checkAuth();
            if (!token) return;
            const id = document.getElementById('promoId').value;
            const data = {
                nome: document.getElementById('nome').value,
                descricao: document.getElementById('descricao').value,
                tipo: document.getElementById('tipo').value,
                pontos_necessarios: document.getElementById('pontos_necessarios').value || 0,
                data_inicio: document.getElementById('data_inicio').value,
                data_fim: document.getElementById('data_fim').value,
                ativo: document.getElementById('ativo').checked ? 1 : 0
            };
            try {
                const url = id ? `/api/empresa/promocoes/${id}` : '/api/empresa/promocoes';
                const method = id ? 'PUT' : 'POST';
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                if (response.ok) {
                    closeModal();
                    loadPromocoes();
                } else {
                    alert('Erro ao salvar promo??o');
                }
            } catch (error) {
                console.error('Erro ao salvar:', error);
                alert('Erro ao salvar promo??o');
            }
        }
        function showEmptyState() {
            document.getElementById('empty-state').style.display = 'block';
            document.getElementById('totalInfo').textContent = '0 promo??es';
        }
        document.addEventListener('DOMContentLoaded', loadPromocoes);
    </script>
