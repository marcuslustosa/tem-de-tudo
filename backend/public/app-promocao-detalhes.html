<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta content="#e10098" name="theme-color"/>
<meta content="yes" name="mobile-web-app-capable"/>
<meta content="yes" name="apple-mobile-web-app-capable"/>
<meta content="default" name="apple-mobile-web-app-status-bar-style"/>

<link href="manifest.json" rel="manifest"/>
<link href="img/icon-192.png" rel="apple-touch-icon"/>
<link href="img/icon-32.png" rel="icon" sizes="32x32" type="image/png"/>
<title>Detalhes da Promo??o - Tem de Tudo</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<link href="/css/style.css" rel="stylesheet"/>
</head>
<body>
<div class="header">
<button class="btn-back" onclick="history.back()">
<i class="fas fa-arrow-left"></i>
</button>
<div class="promo-badge" id="promoBadge">PROMO??O</div>
<h1 class="promo-title" id="promoTitle">Carregando...</h1>
<div class="promo-empresa">
<i class="fas fa-store"></i>
<span id="promoEmpresa">...</span>
</div>
</div>
<div class="content">
<div class="info-card">
<div class="info-row">
<span class="info-label">
<i class="fas fa-coins"></i> Pontos Necess?rios
                </span>
<span class="info-value" id="pontosNecessarios">0</span>
</div>
<div class="info-row">
<span class="info-label">
<i class="fas fa-user"></i> Seus Pontos
                </span>
<span class="info-value" id="seusPontos">0</span>
</div>
<div class="info-row">
<span class="info-label">
<i class="fas fa-calendar"></i> V?lido at?
                </span>
<span class="info-value" id="validade">--/--/----</span>
</div>
</div>
<div class="description" id="descricao">
            Carregando descri??o...
        </div>
<div class="terms">
<i class="fas fa-exclamation-triangle"></i>
<strong>Importante:</strong> Ap?s resgatar, voc? ter? um cupom dispon?vel para usar no estabelecimento. Apresente o cupom no caixa antes de realizar o pagamento.
        </div>
<div class="countdown" id="countdown"></div>
<button class="btn-resgatar" id="btnResgatar" onclick="resgatarPromocao()">
<i class="fas fa-gift"></i>
            Resgatar Promo??o
        </button>
</div>
<script>
        const API_BASE_URL = window.location.hostname === 'localhost' ? 
            'http://localhost:8001' : 
            'https://tem-de-tudo.onrender.com';
        const urlParams = new URLSearchParams(window.location.search);
        const promocaoId = urlParams.get('id');
        let promocao = null;
        let userPontos = 0;
        document.addEventListener('DOMContentLoaded', () => {
            if (!promocaoId) {
                alert('Promo??o n?o encontrada');
                history.back();
                return;
            }
            carregarPromocao();
            carregarPontosUsuario();
        });
        async function carregarPromocao() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/promocoes/${promocaoId}`);
                const data = await response.json();
                if (data.success && data.data) {
                    promocao = data.data;
                    renderizarPromocao();
                    iniciarCountdown();
                } else {
                    alert('Promo??o n?o encontrada');
                    history.back();
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao carregar promo??o');
                history.back();
            }
        }
        async function carregarPontosUsuario() {
            const token = localStorage.getItem('token');
            if (!token) return;
            try {
                const response = await fetch(`${API_BASE_URL}/api/perfil`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (data.success && data.data) {
                    userPontos = data.data.pontos || 0;
                    document.getElementById('seusPontos').textContent = userPontos;
                    verificarPontosSuficientes();
                }
            } catch (error) {
                console.error('Erro ao carregar pontos:', error);
            }
        }
        function renderizarPromocao() {
            document.getElementById('promoTitle').textContent = promocao.titulo;
            document.getElementById('promoEmpresa').textContent = promocao.empresa_nome || 'Estabelecimento';
            document.getElementById('pontosNecessarios').textContent = promocao.pontos_necessarios;
            document.getElementById('descricao').textContent = promocao.descricao || 'Sem descri??o dispon?vel';
            const validade = new Date(promocao.validade);
            document.getElementById('validade').textContent = validade.toLocaleDateString('pt-BR');
            // Badge baseado no tipo
            const badge = document.getElementById('promoBadge');
            if (promocao.pontos_necessarios < 50) {
                badge.textContent = 'IMPERD?VEL';
                badge.style.background = 'linear-gradient(135deg, #ff6b6b, #ee5a6f)';
                badge.style.background = 'rgba(239, 68, 68, 0.3)';
            } else if (promocao.pontos_necessarios < 100) {
                badge.textContent = 'DESTAQUE';
                badge.style.background = 'linear-gradient(135deg, #667eea, #764ba2)';
                badge.style.background = 'rgba(251, 191, 36, 0.3)';
            } else {
                badge.textContent = '?? PREMIUM';
                badge.style.background = 'rgba(168, 85, 247, 0.3)';
            }
        }
        function verificarPontosSuficientes() {
            const btn = document.getElementById('btnResgatar');
            if (userPontos < promocao.pontos_necessarios) {
                btn.disabled = true;
                btn.innerHTML = `
                    <i class="fas fa-times-circle"></i>
                    Pontos Insuficientes (faltam ${promocao.pontos_necessarios - userPontos})
                `;
            }
        }
        function iniciarCountdown() {
            const validade = new Date(promocao.validade);
            const agora = new Date();
            const diff = validade - agora;
            if (diff <= 0) {
                document.getElementById('countdown').innerHTML = '? Promo??o expirada';
                document.getElementById('btnResgatar').disabled = true;
                return;
            }
            const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
            if (dias <= 7) {
                document.getElementById('countdown').innerHTML = `? Expira em ${dias} dia${dias !== 1 ? 's' : ''}!`;
            }
        }
        async function resgatarPromocao() {
            const token = localStorage.getItem('token');
            if (!token) {
                alert('? Voc? precisa estar logado para resgatar promo??es');
                window.location.href = 'entrar.html';
                return;
            }
            if (!confirm(`Confirma o resgate desta promo??o?\n\n${promocao.titulo}\nCusto: ${promocao.pontos_necessarios} pontos`)) {
                return;
            }
            const btn = document.getElementById('btnResgatar');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resgatando...';
            try {
                const response = await fetch(`${API_BASE_URL}/api/cupons/resgatar`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ promocao_id: promocaoId })
                });
                const data = await response.json();
                if (data.success) {
                    alert(`? Promo??o resgatada com sucesso!\n\nCupom: ${data.data.codigo}\n\nVoc? pode encontr?-lo na aba "Cupons" do seu perfil.`);
                    window.location.href = '/app-perfil-cliente.html?tab=cupons';
                } else {
                    alert('? ' + (data.message || 'Erro ao resgatar promo??o'));
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-gift"></i> Resgatar Promo??o';
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('? Erro ao conectar com o servidor');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-gift"></i> Resgatar Promo??o';
            }
        }
    </script>
