<body class="bg-surface font-body text-on-surface" data-page="parceiros_tem_de_tudo">
  <header class="bg-[#f7f7f7] dark:bg-slate-950 flex justify-between items-center w-full px-6 py-4 max-w-md mx-auto docked full-width top-0 sticky z-40">
    <div class="flex items-center gap-3">
      <div class="w-12 h-12 rounded-[18px] overflow-hidden bg-surface-container border border-primary/20 p-2">
        <img alt="Tem de Tudo" class="w-full h-full object-contain" src="/img/logo.png" onerror="this.onerror=null;this.src='/img/logo.png.png';" />
      </div>
      <div>
        <p class="text-[11px] font-bold uppercase tracking-[0.18em] text-outline">Buscar lojas</p>
        <h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-[#2e2e34] dark:text-white">Buscar novo comércio</h1>
      </div>
    </div>
    <button class="text-[#E10098] dark:text-[#E10098] hover:opacity-80 transition-opacity scale-95 active:transition-all" type="button">
      <span class="material-symbols-outlined" data-icon="notifications">notifications</span>
    </button>
  </header>

  <main class="max-w-md mx-auto px-6 pb-32">
    <section class="mt-4 space-y-6">
      <div class="space-y-3">
        <div class="relative flex gap-3">
          <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
            <span class="material-symbols-outlined text-[#E10098]" data-icon="search">search</span>
          </div>
          <input
            class="w-full h-14 pl-12 pr-4 bg-surface-container-lowest border-none rounded-xl shadow-[0_4px_20px_rgba(11,31,58,0.04)] focus:ring-2 focus:ring-primary/20 text-body-md placeholder:text-outline-variant"
            placeholder="Digite o nome ou código do comércio"
            type="text"
            id="parceiroBusca"
          />
          <button id="parceiroBuscaBtn" type="button" class="parceiro-search-trigger inline-flex h-14 w-14 items-center justify-center rounded-[18px] bg-[linear-gradient(135deg,#133f8c_0%,#E10098_100%)] text-white shadow-[0_12px_28px_rgba(176,0,118,0.24)]">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">search</span>
          </button>
        </div>
        <p id="partnersSearchHint" class="hidden text-xs font-semibold text-[#B01774]">No mínimo 4 caracteres!</p>
      </div>

      <article class="rounded-[28px] bg-white p-5 shadow-[0_14px_36px_rgba(11,31,58,0.06)] ring-1 ring-black/5">
        <div class="flex items-center justify-between gap-3">
          <div>
            <p class="text-[11px] font-bold uppercase tracking-[0.18em] text-slate-400">Categorias</p>
            <h2 class="mt-2 font-headline text-xl font-extrabold text-on-surface">Descubra por segmento</h2>
          </div>
          <button class="parceiro-filtro-btn parceiro-filtro-btn--all inline-flex h-11 items-center justify-center rounded-full bg-primary px-4 text-xs font-bold uppercase tracking-[0.16em] text-white" type="button" data-category-key="todos">Todos</button>
        </div>
        <div class="mt-4 grid grid-cols-2 gap-3" id="partnerCategoryGrid">
          <button class="parceiro-filtro-btn parceiro-category-card" type="button" data-category-key="restaurantes">
            <span class="parceiro-category-media parceiro-category-media--restaurantes"><span class="material-symbols-outlined">restaurant</span></span>
            <span class="parceiro-category-label">Restaurantes</span>
          </button>
          <button class="parceiro-filtro-btn parceiro-category-card" type="button" data-category-key="sorveterias">
            <span class="parceiro-category-media parceiro-category-media--sorveterias"><span class="material-symbols-outlined">icecream</span></span>
            <span class="parceiro-category-label">Sorveterias</span>
          </button>
          <button class="parceiro-filtro-btn parceiro-category-card" type="button" data-category-key="bares">
            <span class="parceiro-category-media parceiro-category-media--bares"><span class="material-symbols-outlined">local_bar</span></span>
            <span class="parceiro-category-label">Bares</span>
          </button>
          <button class="parceiro-filtro-btn parceiro-category-card" type="button" data-category-key="japonesa">
            <span class="parceiro-category-media parceiro-category-media--japonesa"><span class="material-symbols-outlined">ramen_dining</span></span>
            <span class="parceiro-category-label">Japonesa</span>
          </button>
          <button class="parceiro-filtro-btn parceiro-category-card" type="button" data-category-key="petshops">
            <span class="parceiro-category-media parceiro-category-media--petshops"><span class="material-symbols-outlined">pets</span></span>
            <span class="parceiro-category-label">Petshops</span>
          </button>
          <button class="parceiro-filtro-btn parceiro-category-card" type="button" data-category-key="beleza">
            <span class="parceiro-category-media parceiro-category-media--beleza"><span class="material-symbols-outlined">content_cut</span></span>
            <span class="parceiro-category-label">Beleza</span>
          </button>
        </div>
      </article>
    </section>

    <section class="mt-8 space-y-4">
      <div class="flex items-end justify-between gap-3">
        <div>
          <p class="text-[11px] font-bold uppercase tracking-[0.18em] text-slate-400">Resultados e destaques</p>
          <h2 class="mt-2 font-headline text-2xl font-extrabold text-on-surface">Escolha onde pontuar hoje</h2>
        </div>
      </div>
      <div id="partners-loading" class="text-sm text-outline hidden">Carregando parceiros...</div>
      <p id="partners-empty" class="text-sm text-on-surface-variant hidden">Nenhum parceiro encontrado.</p>
      <div id="partners-grid" class="grid gap-4"></div>
    </section>
  </main>

  <nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/90 backdrop-blur-xl border-t border-[#00666e]/20 shadow-[0_-8px_32px_rgba(11,31,58,0.08)] z-50 rounded-t-[1.5rem]">

      <span class="material-symbols-outlined" data-icon="storefront" style="font-variation-settings: 'FILL' 1;">storefront</span>

    <a class="flex flex-col items-center justify-center text-[#aeacb4] hover:text-[#133f8c] transition-colors scale-90 active:transition-transform duration-200" href="/recompensas.html">

    <a class="flex flex-col items-center justify-center text-[#aeacb4] hover:text-[#133f8c] transition-colors scale-90 active:transition-transform duration-200" href="/meu_perfil.html">

      <span class="font-['Plus_Jakarta_Sans'] font-semibold text-[10px] uppercase tracking-wider mt-1">Perfil</span>
    </a>
  </nav>
