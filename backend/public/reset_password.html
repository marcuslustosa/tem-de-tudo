<!DOCTYPE html>
<html lang="pt-BR" data-page="reset_password">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-surface">
  <main class="w-full max-w-md space-y-6">
    <div class="text-center space-y-2">
      <h1 class="text-2xl font-bold text-on-surface font-headline">Redefinir senha</h1>
      <p class="text-on-surface-variant text-sm">Informe a nova senha.</p>
    </div>
    <form class="space-y-4">
      <input id="rpEmail" type="email" class="w-full border rounded-xl px-4 py-3" placeholder="seu@email.com" required/>
      <input id="rpToken" type="text" class="w-full border rounded-xl px-4 py-3" placeholder="Token do e-mail" required/>
      <input id="rpPass" type="password" class="w-full border rounded-xl px-4 py-3" placeholder="Nova senha" required/>
      <input id="rpPassConf" type="password" class="w-full border rounded-xl px-4 py-3" placeholder="Confirmar senha" required/>
      <button type="submit" class="w-full py-3 bg-primary text-white rounded-xl font-semibold">Redefinir senha</button>
    </form>
    <a class="text-primary font-semibold text-sm" href="/entrar.html">Voltar</a>
  </main>
  <script src="/js/stitch-app.js"></script>
</body>
</html>
